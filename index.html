<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root { --gold: #f1c40f; --blue: #0088cc; --purple: #9b59b6; --bg: #050a10; --card: #151c26; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .card { background: var(--card); border-radius: 20px; padding: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .ton-val { font-size: 3rem; font-weight: 900; color: var(--gold); margin: 5px 0; }
        .bar-bg { height: 8px; background: #000; border-radius: 10px; overflow: hidden; margin: 10px 0; }
        .xp-fill { height: 100%; background: var(--purple); width: 0%; transition: width 0.5s; }
        .nrg-fill { height: 100%; background: var(--gold); width: 0%; transition: width 0.5s; }
        .footer { background: #0d121a; padding: 20px; border-radius: 30px 30px 0 0; }
        .btn-main { background: var(--blue); border: none; padding: 18px; border-radius: 18px; width: 100%; font-weight: 800; color: white; font-size: 1.1rem; margin-bottom: 10px; }
        .btn-group { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .btn-sub { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 10px 5px; border-radius: 12px; font-size: 0.7rem; display: flex; flex-direction: column; align-items: center; }
    </style>
</head>
<body onload="load()">

<div class="container">
    <div class="card">
        <div style="display:flex; justify-content:space-between; font-size:0.8rem; opacity:0.6;">
            <span>LVL <b id="lvlVal">1</b></span>
            <span>XP <b id="xpText">0/100</b></span>
        </div>
        <div class="bar-bg"><div id="xpBar" class="xp-fill"></div></div>
        <div class="ton-val" id="bal">0.0000</div>
        <small style="opacity:0.4;">Withdraw at 0.5 TON + 3 Invites</small>
    </div>
    <div class="card"><h6 style="opacity:0.5; margin:0 0 10px 0;">TOP LÍDERES</h6><div id="leaderboard"></div></div>
</div>

<div class="footer">
    <div style="display:flex; justify-content:space-between; font-size:0.8rem; margin-bottom:5px;">
        <span style="opacity:0.6;">⚡ ENERGY</span>
        <span id="nrgText">--/--</span>
    </div>
    <div class="bar-bg" style="margin-bottom:15px;"><div id="nrgBar" class="nrg-fill"></div></div>
    <button id="spinBtn" class="btn-main" onclick="handleSpin()">SPIN & EARN</button>
    <div class="btn-group">
        <button class="btn-sub" onclick="showHelp()"><i class="bi bi-info-circle"></i>INFO</button>
        <button class="btn-sub" onclick="energyRefill()"><i class="bi bi-lightning"></i>ENERGY</button>
        <button class="btn-sub" onclick="withdraw()"><i class="bi bi-wallet2"></i>CASH</button>
        <button class="btn-sub" onclick="shareInvite()"><i class="bi bi-people"></i>INVITE</button>
    </div>
</div>

<script>
    const tele = window.Telegram.WebApp;
    const user = tele.initDataUnsafe.user || {id: "5401881400"};
    const R_URL = "https://telegramadsbot-jzso.onrender.com";
    const AD_LINK = "https://www.profitablecpmratenetwork.com/hik7av4u?key=a5a57d96e63b358a8e7549b51cab45af";

    async function load() {
        const startParam = tele.initDataUnsafe.start_param || "None";
        const refBy = startParam.replace('ref_', '');
        const r = await fetch(`${R_URL}/check_eligibility?user_id=${user.id}&ref_by=${refBy}`);
        updateUI(await r.json());
        
        const lr = await fetch(`${R_URL}/get_leaderboard`);
        const leaders = await lr.json();
        let html = "";
        leaders.forEach((u, i) => { html += `<div style="display:flex; justify-content:space-between; font-size:0.8rem; padding:4px 0;"><span>#${i+1} ID:${u.uid.slice(0,5)}</span><b>${u.balance.toFixed(4)}</b></div>`; });
        document.getElementById('leaderboard').innerHTML = html;
        tele.expand();
    }

    function updateUI(d) {
        document.getElementById('bal').innerText = d.balance.toFixed(4);
        document.getElementById('lvlVal').innerText = d.level;
        document.getElementById('xpBar').style.width = (d.xp || 0) + "%";
        document.getElementById('xpText').innerText = (d.xp || 0) + "/100";
        let max = d.max_energy || 10;
        document.getElementById('nrgText').innerText = d.energy + "/" + max;
        document.getElementById('nrgBar').style.width = (d.energy / max * 100) + "%";
    }

    function handleSpin() {
        let nrg = parseInt(document.getElementById('nrgText').innerText);
        if(nrg <= 0) { tele.showAlert("⚡ Sem Energia!"); return; }
        
        window.open(AD_LINK, '_blank'); // Abre o anúncio
        
        let btn = document.getElementById('spinBtn');
        btn.disabled = true;
        let t = 15;
        let timer = setInterval(async () => {
            btn.innerHTML = `WAIT ${t}s`;
            if(t-- <= 0) {
                clearInterval(timer);
                // CHAMADA AO BACKEND APÓS O TEMPO
                const res = await fetch(`${R_URL}/reward_spin`, { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({user_id: user.id}) 
                });
                const data = await res.json();
                if(data.error) tele.showAlert(data.error); else updateUI(data);
                btn.disabled = false; btn.innerHTML = `SPIN & EARN`;
            }
        }, 1000);
    }

    function energyRefill() {
        tele.showConfirm("Ver anúncio para +5 Energia?", async (c) => {
            if(c) {
                window.open(AD_LINK, '_blank');
                const res = await fetch(`${R_URL}/watch_ads_energy`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({user_id: user.id}) });
                updateUI(await res.json());
            }
        });
    }

    function showHelp() {
        tele.showPopup({ title: "INFO", message: "• Ganhos: 0.0002 TON/Ad\n• Convites: 10% de bónus\n• Saque: 0.5 TON + 3 Amigos", buttons: [{type: "close", text: "OK"}] });
    }

    async function withdraw() {
        const r = await fetch(`${R_URL}/request_withdraw`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({user_id: user.id}) });
        const d = await r.json(); tele.showAlert(d.error || d.success);
    }

    function shareInvite() { window.open(`https://t.me/share/url?url=https://t.me/O_TEU_BOT_NAME?start=ref_${user.id}&text=Ganha TON comigo!`); }
</script>
</body>
</html>
