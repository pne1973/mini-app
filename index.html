<script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>

<script>
    // Global controller instance
    let richAds;

    // Initialize when Telegram is ready
    window.Telegram.WebApp.ready();

    function initRichAds() {
        try {
            richAds = new TelegramAdsController();
            richAds.initialize({
                pubId: "76092",
                appId: "6586"
            });
            console.log("Rich Ads Initialized");
        } catch (err) {
            console.error("SDK Load Failed:", err);
        }
    }

    // Call init immediately
    initRichAds();

    function startAdFlow() {
        if (!richAds) {
            initRichAds(); // Re-try if it didn't load
        }

        const status = document.getElementById('status');
        status.innerText = "fetching high-cpm ad...";

        richAds.showAd({
            type: 'rewarded', // Video format
            onComplete: () => {
                status.innerText = "Ad complete! Rewarding...";
                // Your backend reward logic
                fetch(`https://telegramadsbot-jzso.onrender.com/reward?user_id=${window.Telegram.WebApp.initDataUnsafe.user.id}`)
                    .then(() => window.Telegram.WebApp.showAlert("💎 0.001 TON Earned!"));
            },
            onError: (error) => {
                console.log("RichAds Video Error:", error);
                // FALLBACK: If video fails, RichAds 'pop' format is very reliable
                richAds.showAd({ 
                    type: 'pop', 
                    onComplete: () => {
                         window.Telegram.WebApp.showAlert("Bonus: 0.0005 TON for popup ad!");
                    }
                });
            }
        });
    }
</script>
