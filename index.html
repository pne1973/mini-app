<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // UPDATE THIS to your actual Render Web Service URL
    const API_URL = "https://telegramadsbot-jzso.onrender.com/"; 
    const userId = tg.initDataUnsafe?.user?.id;

    async function loadData() {
        if (!userId) return;
        // Fetch start_param for referral tracking
        const startParam = tg.initDataUnsafe?.start_param || '';
        try {
            const res = await fetch(`${API_URL}/get_user_info?user_id=${userId}&ref_by=${startParam}`);
            const data = await res.json();
            document.getElementById('balance').innerText = `${data.bal.toFixed(4)} TON`;
        } catch (e) {
            console.error("Backend connection failed.");
        }
    }

    async function handleClaim() {
        try {
            const res = await fetch(`${API_URL}/reward?user_id=${userId}`);
            const data = await res.json();
            if (data.status === "ok") {
                document.getElementById('balance').innerText = `${data.new_bal} TON`;
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            } else {
                tg.showAlert("Daily limit (15) reached!");
            }
        } catch (e) {
            tg.showAlert("Server error. Try again later.");
        }
    }

    // Call loadData when app opens
    loadData();
</script>
