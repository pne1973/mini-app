<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            background-color: #24292e; 
            color: white; 
            text-align: center; 
            font-family: sans-serif; 
            padding: 50px; 
        }
        .status { color: #7cfc00; font-weight: bold; }
    </style>

        window.Telegram.WebApp.expand();

</html>
