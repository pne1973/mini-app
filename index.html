<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TON Pro Earner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #0a0a0a; color: white; text-align: center; padding: 20px; }
        .card { background: #161616; border-radius: 20px; padding: 30px; border: 1px solid #333; max-width: 350px; margin: auto; }
        .btn { background: #00b4d8; color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .bonus { background: #f7931a; }
        #status { font-size: 12px; color: #666; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>💎 TON Earner</h1>
        <p>Earn TON by watching ads!</p>
        <button class="btn bonus" onclick="claimDaily()">🎁 CLAIM DAILY BONUS</button>
        <button class="btn" onclick="startAdFlow()">🚀 WATCH VIDEO (+0.001 TON)</button>
        <div id="status">Ready</div>
    </div>

    <script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        // CHANGE THIS TO YOUR ACTUAL RENDER LINK
        const API_URL = "https://telegramadsbot-jzso.onrender.com";

        function claimDaily() {
            fetch(`${API_URL}/daily?user_id=${tg.initDataUnsafe.user.id}`)
                .then(r => r.ok ? tg.showAlert("Bonus Claimed!") : tg.showAlert("Wait 24h!"));
        }

        function startAdFlow() {
            const controller = new TelegramAdsController();
            controller.initialize({ pubId: "76092", appId: "6584" });
            controller.showAd({
                type: 'rewarded',
                onComplete: () => {
                    const v = Math.floor(Date.now() / 1000);
                    fetch(`${API_URL}/reward?user_id=${tg.initDataUnsafe.user.id}&verify=${v}`)
                        .then(() => tg.showAlert("Success! Reward added."));
                },
                onError: () => tg.showAlert("No ads. Try later.")
            });
        }
    </script>
</body>
</html>
