<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Earner</title>
    <script src="https://telegram.org/js/telegram-web-app.js?v=2.0"></script>
    <style>
        body { 
            background-color: #000000; 
            color: #ffffff; 
            font-family: Arial, sans-serif; 
            text-align: center; 
            padding-top: 50px;
        }
        .btn-ad {
            display: block;
            width: 80%;
            margin: 20px auto;
            padding: 20px;
            background-color: #0088cc;
            color: white;
            text-decoration: none;
            border-radius: 15px;
            font-weight: bold;
            font-size: 20px;
        }
        #claimBtn {
            display: none; /* Only shows after clicking ad */
            width: 80%;
            margin: 20px auto;
            padding: 20px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 15px;
            font-weight: bold;
            font-size: 20px;
        }
    </style>
</head>
<body>

    <h1>💎 CRYPTO EARNER</h1>
    <p>Earn TON by viewing ads</p>

    <a href="https://www.effectivegatecpm.com/hik7av4u?key=a5a57d96e63b358a8e7549b51cab45af" 
       target="_blank" 
       class="btn-ad" 
       onclick="document.getElementById('claimBtn').style.display='block';">
       1. VIEW AD
    </a>

    <button id="claimBtn" onclick="sendReward()">2. CLAIM REWARD</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        function sendReward() {
            const uid = tg.initDataUnsafe.user?.id || "0";
            tg.showConfirm("Claim your 0.001 TON now?", (ok) => {
                if(ok) {
                    fetch(`https://telegramadsbot-jzso.onrender.com/reward?user_id=${uid}`)
                    .then(() => {
                        tg.showAlert("✅ TON added to balance!");
                        tg.close();
                    })
                    .catch(() => tg.showAlert("Connecting to server... try once more."));
                }
            });
        }
    </script>
</body>
</html>
