<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #050a10; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; }
        .card-main { background: linear-gradient(145deg, #0d1621, #162230); border: 1px solid #30363d; border-radius: 25px; padding: 30px; margin-top: 20px; }
        .ton-text { font-size: 3.5rem; font-weight: 800; color: #f1c40f; text-shadow: 0 0 15px rgba(241,196,15,0.3); }
        .btn-spin { background: #0088cc; border: none; padding: 20px; border-radius: 15px; width: 100%; font-weight: bold; font-size: 1.2rem; transition: 0.3s; }
        .btn-spin:disabled { background: #1b2733; color: #4e5c6d; }
        #admPanel { border: 1px solid #f1c40f; color: #f1c40f; padding: 10px; border-radius: 12px; display: none; cursor: pointer; margin-bottom: 20px; }
    </style>
</head>
<body class="p-3">

    <div id="admPanel" onclick="showAdmin()">👑 COMMAND CENTER (ADMIN)</div>

    <div class="card-main">
        <small class="text-secondary">ESTIMATED EARNINGS</small>
        <div class="ton-text" id="bal">0.0000</div>
        <div class="badge bg-primary">TON COIN</div>
    </div>

    <div class="d-flex justify-content-around my-4">
        <div>⚡ Energy: <b id="nrg">--</b></div>
        <div>⭐ Level: <b id="lvl">--</b></div>
    </div>

    <button id="spinBtn" class="btn-spin" onclick="handleSpin()">🎰 SPIN & WATCH AD</button>

    <script>
        const tele = window.Telegram.WebApp;
        const user = tele.initDataUnsafe.user || {id: "5401881400"};
        const R_URL = "https://telegramadsbot-jzso.onrender.com";
        const AD_LINK = "https://www.profitablecpmratenetwork.com/hik7av4u?key=a5a57d96e63b358a8e7549b51cab45af";

        async function load() {
            if(String(user.id) === "5401881400") document.getElementById('admPanel').style.display = 'block';
            const r = await fetch(`${R_URL}/check_eligibility?user_id=${user.id}`);
            const d = await r.json();
            updateUI(d);
            tele.expand();
        }

        function updateUI(d) {
            document.getElementById('bal').innerText = d.balance.toFixed(4);
            document.getElementById('nrg').innerText = d.energy + "/10";
            document.getElementById('lvl').innerText = d.level;
        }

        function handleSpin() {
            window.open(AD_LINK, '_blank');
            let btn = document.getElementById('spinBtn');
            btn.disabled = true;
            let count = 15;
            let timer = setInterval(async () => {
                btn.innerText = `PROCESSING... ${count}s`;
                if(count-- <= 0) {
                    clearInterval(timer);
                    const r = await fetch(`${R_URL}/reward_spin`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({user_id: user.id})
                    });
                    const d = await r.json();
                    updateUI(d);
                    btn.disabled = false;
                    btn.innerText = "🎰 SPIN & WATCH AD";
                }
            }, 1000);
        }

        async function showAdmin() {
            const r = await fetch(`${R_URL}/admin_stats?user_id=${user.id}`);
            const d = await r.json();
            tele.showPopup({ title: "Admin Center", message: `Total Users: ${d.total_users}\nTotal Debt: ${d.debt.toFixed(4)} TON` });
        }

        load();
    </script>
</body>
</html>
