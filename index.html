<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TON EMPIRE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #0b0e14; color: white; font-family: sans-serif; }
        .card { background: #161b22; border-radius: 15px; padding: 15px; border: 1px solid #30363d; margin-bottom: 15px; }
        /* DESTAQUE ADMIN */
        #adminPanel { border: 2px solid #ff4d4d; background: #2d0a0a; display: none; margin-bottom: 20px; box-shadow: 0 0 15px rgba(255, 77, 77, 0.4); }
        .xp-bar { width: 100%; height: 8px; background: #30363d; border-radius: 5px; margin: 10px 0; }
        .xp-fill { height: 100%; background: #238636; width: 0%; transition: 0.5s; }
        .btn-spin { background: linear-gradient(45deg, #0088cc, #00d4ff); border: none; font-weight: bold; padding: 15px; width: 100%; border-radius: 12px; color: white; }
        #bal { color: #f1c40f; font-size: 2.2rem; font-weight: 800; }
        .stats-text { color: #8b949e; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="container py-3">
        <div id="adminPanel" class="card text-center">
            <h6 style="color: #ff4d4d; font-weight: 900;">🚨 SYSTEM ADMIN CONSOLE</h6>
            <div id="admStats" class="small">Connecting to database...</div>
        </div>

        <div class="text-center mb-3">
            <h3 class="fw-bold">💎 TON EMPIRE</h3>
        </div>

        <div class="card text-center shadow">
            <div class="d-flex justify-content-between stats-text">
                <span>LVL <b id="lvl" class="text-white">1</b></span>
                <span>ENERGY <b id="nrg" class="text-white">10/10</b></span>
            </div>
            <div class="xp-bar"><div id="xpFill" class="xp-fill"></div></div>
            <div id="bal">0.0000</div>
            <span class="stats-text">TON BALANCE</span>
        </div>

        <button class="btn btn-warning w-100 fw-bold mb-3" onclick="daily()">🎁 CLAIM DAILY BONUS</button>
        <button id="spinBtn" class="btn-spin mb-3" onclick="startSpin()">🎰 SPIN & WATCH AD (15s)</button>

        <div class="d-flex gap-2">
            <button class="btn btn-dark w-50" onclick="share()">🔗 INVITE</button>
            <button class="btn btn-dark w-50" onclick="withdraw()">💸 WITHDRAW</button>
        </div>

        <div class="text-center mt-3 stats-text">
            Tickets: <b id="tix" class="text-white">0</b> | Refs: <b id="refs" class="text-white">0/3</b>
        </div>
    </div>

    <script>
        const tele = window.Telegram.WebApp;
        tele.expand();
        const user = tele.initDataUnsafe.user || {id: "5401881400"};
        const R_URL = "https://ton-empire-bot.onrender.com"; // URL ATUALIZADO
        const AD_URL = "https://www.profitablecpmratenetwork.com/hik7av4u?key=a5a57d96e63b358a8e7549b51cab45af";

        async function load() {
            const res = await (await fetch(`${R_URL}/check_eligibility?user_id=${user.id}`)).json();
            document.getElementById('bal').innerText = res.balance.toFixed(4);
            document.getElementById('lvl').innerText = res.level;
            document.getElementById('nrg').innerText = res.energy + "/10";
            document.getElementById('tix').innerText = res.tickets;
            document.getElementById('refs').innerText = res.ref_count + "/3";
            document.getElementById('xpFill').style.width = (res.xp % 100) + "%";

            // LÓGICA DE EXIBIÇÃO DO ADMIN
            if(String(user.id) === "5401881400") {
                document.getElementById('adminPanel').style.display = 'block';
                const adm = await (await fetch(`${R_URL}/admin_stats?user_id=${user.id}`)).json();
                document.getElementById('admStats').innerHTML = `Users: <b>${adm.total_users}</b> | Debt: <b>${adm.debt.toFixed(4)} TON</b>`;
            }
        }

        function startSpin() {
            window.open(AD_URL, '_blank');
            const btn = document.getElementById('spinBtn');
            btn.disabled = true;
            let sec = 15;
            const t = setInterval(async () => {
                btn.innerText = `WAITING... ${sec}s`;
                if(sec-- <= 0) {
                    clearInterval(t);
                    const r = await fetch(`${R_URL}/reward_spin`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({user_id: user.id})
                    });
                    btn.disabled = false;
                    btn.innerText = "🎰 SPIN & WATCH AD (15s)";
                    load();
                }
            }, 1000);
        }

        async function daily() {
            const r = await fetch(`${R_URL}/daily_checkin`, {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({user_id: user.id})});
            const d = await r.json(); tele.showAlert(d.msg); load();
        }

        function share() { tele.switchInlineQuery(`Join TON Empire!\nhttps://t.me/Myearnbot2026_bot?start=${user.id}`); }
        function withdraw() { tele.showAlert("Minimum: 0.1 TON + 3 Referrals."); }

        load();
    </script>
</body>
</html>
