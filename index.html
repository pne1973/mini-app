<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #050a10; color: white; text-align: center; font-family: sans-serif; }
        .balance-card { background: linear-gradient(145deg, #0d1621, #162230); border-radius: 25px; padding: 35px; margin: 20px; border: 1px solid #30363d; }
        .ton-value { font-size: 3.5rem; font-weight: 800; color: #f1c40f; }
        .btn-main { background: #0088cc; border: none; padding: 20px; border-radius: 18px; font-weight: bold; width: 90%; font-size: 1.2rem; }
        .admin-box { border: 1px solid #f1c40f; color: #f1c40f; padding: 10px; border-radius: 10px; cursor: pointer; display: none; margin: 10px auto; width: 80%; }
    </style>
</head>
<body>
    <div id="adm" class="admin-box" onclick="showAdmin()">👑 COMMAND CENTER</div>

    <div class="balance-card">
        <small class="text-secondary">MY BALANCE</small>
        <div class="ton-value" id="bal">0.0000</div>
        <div class="badge bg-primary">TON COIN</div>
    </div>

    <div class="d-flex justify-content-around mb-4">
        <span>⚡ Energia: <b id="nrg">--</b></span>
        <span>⭐ Nível: <b id="lvl">--</b></span>
    </div>

    <button id="spinBtn" class="btn-main" onclick="handleSpin()">🎰 SPIN & EARN</button>

    <script>
        const tele = window.Telegram.WebApp;
        const user = tele.initDataUnsafe.user || {id: "5401881400"};
        const R_URL = "https://telegramadsbot-jzso.onrender.com";
        const AD_LINK = "https://www.profitablecpmratenetwork.com/hik7av4u?key=a5a57d96e63b358a8e7549b51cab45af";

        async function load() {
            if(String(user.id) === "5401881400") document.getElementById('adm').style.display = 'block';
            const r = await fetch(`${R_URL}/check_eligibility?user_id=${user.id}`);
            const d = await r.json();
            updateUI(d);
        }

        function updateUI(d) {
            document.getElementById('bal').innerText = d.balance.toFixed(4);
            document.getElementById('nrg').innerText = d.energy + "/10";
            document.getElementById('lvl').innerText = d.level;
        }

        function handleSpin() {
            window.open(AD_LINK, '_blank'); // Abre Adsterra
            let btn = document.getElementById('spinBtn');
            btn.disabled = true;
            let count = 15;
            let timer = setInterval(async () => {
                btn.innerText = `AGUARDE... ${count}s`;
                if(count-- <= 0) {
                    clearInterval(timer);
                    const r = await fetch(`${R_URL}/reward_spin`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({user_id: user.id})
                    });
                    const d = await r.json();
                    updateUI(d);
                    btn.disabled = false;
                    btn.innerText = "🎰 SPIN & EARN";
                }
            }, 1000);
        }

        async function showAdmin() {
            const r = await fetch(`${R_URL}/admin_stats?user_id=${user.id}`);
            const d = await r.json();
            tele.showPopup({ title: "Admin", message: `Users: ${d.total_users}\nDebt: ${d.debt.toFixed(4)} TON` });
        }

        load();
        tele.expand();
    </script>
</body>
</html>
