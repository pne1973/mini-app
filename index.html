<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Earner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 40px 20px; background: #0e1621; color: white; }
        .card { background: #17212b; padding: 30px; border-radius: 20px; border: 1px solid #242f3d; }
        .ad-button {
            display: block;
            background: #0088cc;
            color: white;
            padding: 20px;
            text-decoration: none;
            border-radius: 12px;
            font-weight: bold;
            margin: 20px 0;
            font-size: 18px;
        }
        #claim {
            background: #28a745;
            border: none;
            color: white;
            padding: 15px 40px;
            border-radius: 10px;
            font-weight: bold;
            display: none; /* Hidden at start */
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>💎 Crypto Earner</h1>
        <p>1. Tap the button to view ad<br>2. Come back and claim reward</p>

        <a href="https://www.effectivegatecpm.com/hik7av4u?key=a5a57d96e63b358a8e7549b51cab45af" 
           target="_blank" 
           class="ad-button" 
           onclick="document.getElementById('claim').style.display='inline-block'">
           🚀 VIEW AD & EARN
        </a>

        <br>
        <button id="claim" onclick="sendReward()">🎁 CLAIM 0.001 TON</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        function sendReward() {
            const uid = tg.initDataUnsafe.user?.id || "user";
            fetch(`https://telegramadsbot-jzso.onrender.com/reward?user_id=${uid}`)
                .then(() => {
                    tg.showAlert("✅ 0.001 TON Added!");
                    document.getElementById('claim').style.display='none';
                })
                .catch(() => tg.showAlert("Server is waking up... try once more!"));
        }
    </script>
</body>
</html>
