<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0b0e11; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 15px; }
        .card { background: #1c1f24; border-radius: 15px; padding: 15px; margin: 10px 0; border: 1px solid #2d333b; }
        .bal-val { font-size: 32px; color: #0088cc; font-weight: bold; margin: 5px 0; }
        button { background: #0088cc; color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; font-size: 14px; font-weight: bold; cursor: pointer; margin-top: 8px; }
        .ticker { background: rgba(124, 252, 0, 0.1); color: #7cfc00; font-size: 11px; padding: 8px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #7cfc0033; }
        input { width: 100%; background: #000; color: #fff; border: 1px solid #333; padding: 12px; border-radius: 8px; margin-top: 10px; box-sizing: border-box; text-align: center; }
        .task-row { display: flex; justify-content: space-between; align-items: center; background: #000; padding: 10px; border-radius: 10px; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="ticker" id="ticker">🌐 Connecting to live network...</div>

    <div style="display:flex; justify-content:space-between; font-size:11px; padding:0 5px; color:#8a919e;">
        <span id="tier">🥉 BRONZE</span>
        <span id="streakDisplay">🔥 0 DAY STREAK</span>
    </div>

    <div class="card">
        <div style="color:#8a919e; font-size:11px;">AVAILABLE BALANCE</div>
        <div id="bal" class="bal-val">0.0000 TON</div>
        <button onclick="playSpin()" id="spinBtn">🎰 LUCKY SPIN (Watch Ad)</button>
    </div>

    <div class="card" id="taskCard">
        <div style="color:#0088cc; font-size:11px; font-weight:bold;">📋 EARN BONUS</div>
        <div class="task-row">
            <div style="text-align:left;"><div style="font-size:12px;">Join Channel</div><div style="font-size:10px; color:#27ae60;">+0.005 TON</div></div>
            <button onclick="doTask()" id="taskBtn" style="width:auto; padding:5px 15px; margin:0; font-size:11px;">GO</button>
        </div>
    </div>

    <div class="card">
        <div style="color:#f1c40f; font-size:11px; font-weight:bold;">🏆 WEEKLY RECRUITERS</div>
        <div id="leaderboard" style="font-size:12px; margin:10px 0;"></div>
        <button onclick="shareInvite()" style="background:#f39c12;">📤 INVITE FRIENDS</button>
        <button onclick="copyLink()" id="cBtn" style="background:#34495e; font-size:11px;">🔗 COPY MY LINK</button>
    </div>

    <div class="card">
        <div style="color:#8a919e; font-size:11px;">WITHDRAW (Min 0.05 TON)</div>
        <input type="text" id="wallet" placeholder="TON Address (UQ...)">
        <button onclick="withdraw()" id="wBtn">Request Payout</button>
    </div>

    <script>
        const tele = window.Telegram.WebApp;
        const RENDER_URL = "https://telegramadsbot-jzso.onrender.com";
        const AD_URL = "https://www.profitablecpmratenetwork.com/hik7av4u?key=a5a57d96e63b358a8e7549b51cab45af";
        const BOT_USER = "Myearnbot2026_bot";
        const user = tele.initDataUnsafe?.user;

        const _supabase = supabase.createClient('https://your-id.supabase.co', 'your-anon-key');

        async function init() {
            if(!user) return;
            tele.expand();
            loadData();
            listenRealtime();
        }

        async function loadData() {
            const res = await fetch(`${RENDER_URL}/check_eligibility?user_id=${user.id}`);
            const data = await res.json();
            document.getElementById('bal').innerText = data.bal.toFixed(4) + " TON";
            document.getElementById('streakDisplay').innerText = `🔥 ${data.streak_days} DAY STREAK`;
            if(data.joined_channel) document.getElementById('taskCard').style.display = 'none';

            const lb = await (await fetch(`${RENDER_URL}/referral_leaderboard`)).json();
            document.getElementById('leaderboard').innerHTML = lb.map((u,i)=>`<div>${i+1}. ${u.name} - ${u.count} refs</div>`).join('');
        }

        function listenRealtime() {
            _supabase.channel('users').on('postgres_changes', {event:'UPDATE', schema:'public', table:'users'}, payload => {
                const diff = payload.new.bal - payload.old.bal;
                if(diff > 0) document.getElementById('ticker').innerText = `💎 User ...${payload.new.uid.slice(-4)} earned +${diff.toFixed(4)} TON`;
            }).subscribe();
        }

        async function playSpin() {
            tele.openLink(AD_URL);
            setTimeout(async () => {
                const res = await fetch(`${RENDER_URL}/reward_spin?user_id=${user.id}`);
                const data = await res.json();
                tele.showAlert(`Win: +${data.win} TON`);
                loadData();
            }, 4000);
        }

        async function doTask() {
            const btn = document.getElementById('taskBtn');
            if(btn.innerText === "GO") {
                tele.openTelegramLink("https://t.me/your_channel"); // ⚠️ CHANGE
                btn.innerText = "VERIFY";
            } else {
                const res = await (await fetch(`${RENDER_URL}/verify_channel?user_id=${user.id}`)).json();
                if(res.error) tele.showAlert(res.error);
                else { tele.showAlert(res.msg); loadData(); }
            }
        }

        function shareInvite() {
            const url = `https://t.me/${BOT_USER}?start=${user.id}`;
            tele.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(url)}&text=Earn+TON!`);
        }

        function copyLink() {
            const url = `https://t.me/${BOT_USER}?start=${user.id}`;
            const el = document.createElement('textarea'); el.value = url; document.body.appendChild(el); el.select(); document.execCommand('copy'); document.body.removeChild(el);
            tele.showAlert("Link Copied!");
        }

        async function withdraw() {
            const addr = document.getElementById('wallet').value;
            const res = await fetch(`${RENDER_URL}/withdraw`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({user_id:user.id, address:addr})});
            const d = await res.json();
            tele.showAlert(d.status === "ok" ? "Pending Approval" : d.error);
        }

        init();
    </script>
</body>
</html>
