<script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>

<div class="card">
    <div style="color:#8a919e; font-size:11px;">AVAILABLE BALANCE</div>
    <div id="bal" class="bal-val">0.0000 TON</div>
    <div style="font-size:10px; color:#f1c40f; margin-bottom:10px;">⚡ Energy: <span id="energyVal">0</span>/10</div>
    
    <button onclick="playSpin()" id="spinBtn">🎰 LUCKY SPIN (30s Ad)</button>
    <button onclick="claimDaily()" id="dailyBtn" style="background:#27ae60;">📅 DAILY CHECK-IN (60s Ad)</button>
</div>

<div class="card">
    <div style="color:#8a919e; font-size:11px;">WITHDRAWAL CENTER</div>
    <div id="refTracker" style="font-size:11px; margin:10px 0; color:#e74c3c;">❌ Referrals: 0/3 Required</div>
    <input type="text" id="wallet" placeholder="TON Address (UQ...)">
    <button onclick="withdraw()" id="wBtn" style="background:#2d333b;" disabled>🔒 Withdraw Locked</button>
</div>

<script>
    // ... Initialization code ...

    async function loadData() {
        const res = await (await fetch(`${RENDER_URL}/check_eligibility?user_id=${user.id}`)).json();
        
        // Update Balance & Energy
        document.getElementById('bal').innerText = res.bal.toFixed(4) + " TON";
        document.getElementById('energyVal').innerText = res.is_vip ? "∞" : res.energy;
        
        // Update Payout Button & Referral Tracker
        const wBtn = document.getElementById('wBtn');
        const tracker = document.getElementById('refTracker');
        
        if (res.ref_count >= 3) {
            tracker.innerText = `✅ Referrals: ${res.ref_count}/3 (Unlocked)`;
            tracker.style.color = "#27ae60";
            if (res.bal >= 0.05) {
                wBtn.disabled = false;
                wBtn.innerText = "Request Payout";
                wBtn.style.background = "#0088cc";
            } else {
                wBtn.innerText = "Need 0.05 TON";
            }
        } else {
            tracker.innerText = `❌ Referrals: ${res.ref_count}/3 Required`;
            wBtn.innerText = "🔒 Locked (Need 3 Refs)";
        }
    }

    async function claimDaily() {
        tele.openLink(AD_URL);
        const btn = document.getElementById('dailyBtn');
        let sec = 60; // 60 Second timer for higher value daily reward
        btn.disabled = true;
        
        const timer = setInterval(async () => {
            sec--;
            btn.innerText = `⏳ Watching Ad... (${sec}s)`;
            if(sec <= 0) {
                clearInterval(timer);
                const r = await (await fetch(`${RENDER_URL}/daily_claim?user_id=${user.id}`)).json();
                if(r.error) tele.showAlert(r.error);
                else tele.showAlert("Daily Bonus Added!");
                btn.disabled = false;
                btn.innerText = "📅 DAILY CHECK-IN (60s Ad)";
                loadData();
            }
        }, 1000);
    }
    
    // ... Rest of the functions (playSpin, withdraw, etc.) ...
</script>
