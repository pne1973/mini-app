<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root { --gold: #f1c40f; --blue: #0088cc; --dark-card: rgba(255,255,255,0.03); }
        body { 
            background: #050a10; color: white; font-family: 'Inter', sans-serif;
            margin: 0; height: 100vh; display: flex; flex-direction: column; justify-content: space-between;
        }

        /* Topo: Admin e Stats */
        .header { padding: 15px; text-align: center; }
        .admin-badge { color: var(--gold); border: 1px solid var(--gold); padding: 5px 15px; border-radius: 10px; font-size: 10px; display: none; cursor: pointer; }

        /* Centro: Saldo e Ranking */
        .main-content { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; width: 100%; }
        
        .balance-card { 
            background: linear-gradient(145deg, #0d1621, #162230); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px; padding: 30px; width: 85%; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }
        
        .ton-val { font-size: 3.5rem; font-weight: 900; background: linear-gradient(to bottom, #fff, #aaa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .leaderboard { width: 85%; background: var(--dark-card); border-radius: 20px; padding: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .rank-item { display: flex; justify-content: space-between; padding: 8px 10px; border-bottom: 1px solid rgba(255,255,255,0.02); font-size: 0.8rem; }

        /* Base: Controles e Energia */
        .footer { background: #0a0f16; padding: 25px; border-top: 1px solid rgba(255,255,255,0.05); border-radius: 35px 35px 0 0; }
        
        .energy-text { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 8px; color: #888; }
        .energy-bar { height: 8px; background: #111; border-radius: 5px; overflow: hidden; margin-bottom: 20px; }
        .energy-fill { height: 100%; background: var(--gold); box-shadow: 0 0 10px var(--gold); transition: width 0.5s; }

        .btn-spin { 
            background: var(--blue); color: white; border: none; padding: 20px; border-radius: 20px; 
            width: 100%; font-weight: 800; font-size: 1.1rem; box-shadow: 0 8px 20px rgba(0, 136, 204, 0.3);
        }
        .btn-spin:disabled { background: #1b2733; color: #444; box-shadow: none; }
    </style>
</head>
<body>

    <div class="header">
        <span id="adm" class="admin-badge" onclick="showAdmin()">👑 MASTER ADMIN</span>
    </div>

    <div class="main-content">
        <div class="balance-card">
            <img src="https://cryptologos.cc/logos/toncoin-ton-logo.svg" width="40" style="margin-bottom:10px">
            <div class="ton-val" id="bal">0.0000</div>
            <span class="badge bg-primary">TON EMPIRE</span>
        </div>

        <div class="leaderboard">
            <h6 class="text-center small text-secondary mb-3"><i class="bi bi-trophy-fill"></i> TOP LÍDERES</h6>
            <div id="leaderList"></div>
        </div>
    </div>

    <div class="footer">
        <div class="energy-text">
            <span>⚡ ENERGIA</span>
            <span id="nrgVal">--/10</span>
        </div>
        <div class="energy-bar"><div id="nrgFill" class="energy-fill"></div></div>

        <button id="spinBtn" class="btn-spin mb-3" onclick="handleSpin()">
            <i class="bi bi-play-fill"></i> SPIN & GANHAR TON
        </button>

        <button class="btn btn-outline-light w-100 border-0 opacity-50" onclick="shareInvite()">
            <i class="bi bi-person-plus-fill"></i> CONVIDAR AMIGOS
        </button>
    </div>

    <script>
        const tele = window.Telegram.WebApp;
        const user = tele.initDataUnsafe.user || {id: "5401881400"};
        const R_URL = "https://telegramadsbot-jzso.onrender.com";
        const AD_LINK = "https://www.profitablecpmratenetwork.com/hik7av4u?key=a5a57d96e63b358a8e7549b51cab45af";

        async function init() {
            if(String(user.id) === "5401881400") document.getElementById('adm').style.display = 'inline-block';
            
            // Dados User
            const r = await fetch(`${R_URL}/check_eligibility?user_id=${user.id}`);
            updateUI(await r.json());

            // Rankings
            const lr = await fetch(`${R_URL}/get_leaderboard`);
            const leaders = await lr.json();
            let html = "";
            leaders.forEach((u, i) => {
                html += `<div class="rank-item"><span>#${i+1} User ${u.uid.slice(0,5)}</span><b>${u.balance.toFixed(4)} TON</b></div>`;
            });
            document.getElementById('leaderList').innerHTML = html;
            
            tele.expand();
        }

        function updateUI(d) {
            document.getElementById('bal').innerText = d.balance.toFixed(4);
            document.getElementById('nrgVal').innerText = d.energy + "/10";
            document.getElementById('nrgFill').style.width = (d.energy * 10) + "%";
        }

        function handleSpin() {
            window.open(AD_LINK, '_blank');
            let btn = document.getElementById('spinBtn');
            btn.disabled = true;
            let time = 15;
            let timer = setInterval(async () => {
                btn.innerHTML = `<i class="bi bi-hourglass-split"></i> AGUARDE ${time}s`;
                if(time-- <= 0) {
                    clearInterval(timer);
                    const res = await fetch(`${R_URL}/reward_spin`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({user_id: user.id})
                    });
                    updateUI(await res.json());
                    btn.disabled = false;
                    btn.innerHTML = `<i class="bi bi-play-fill"></i> SPIN & GANHAR TON`;
                    tele.HapticFeedback.notificationOccurred('success');
                }
            }, 1000);
        }

        async function shareInvite() {
            const r = await fetch(`${R_URL}/get_invite_link?user_id=${user.id}`);
            const d = await r.json();
            window.open(`https://t.me/share/url?url=${encodeURIComponent(d.link)}&text=Vem ganhar TON real comigo!`);
        }

        async function showAdmin() {
            const r = await fetch(`${R_URL}/admin_stats?user_id=${user.id}`);
            const d = await r.json();
            tele.showPopup({ title: "Master Admin", message: `Jogadores: ${d.total_users}\nTotal Devido: ${d.debt.toFixed(4)} TON` });
        }

        init();
    </script>
</body>
</html>
