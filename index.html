<style>
    .history-item {
        display: flex; justify-content: space-between; align-items: center;
        background: rgba(255,255,255,0.03); padding: 12px;
        border-radius: 12px; margin-top: 8px; font-size: 13px;
    }
    .status-pending { color: #ffaa00; font-weight: bold; }
    .status-paid { color: #28a745; font-weight: bold; }
</style>

<div id="payoutHistory" style="margin-top: 25px; text-align: left;">
    <div class="stat-label" style="margin-bottom: 10px;">Recent Payouts</div>
    <div id="historyList">
        <p style="font-size: 11px; color: #505b67;">No transactions yet.</p>
    </div>
</div>

<script>
    // Update your syncData() function to include this:
    function syncData() {
        const sp = tg.initDataUnsafe.start_param || "";
        fetch(`${BASE_URL}/get_user_info?user_id=${tg.initDataUnsafe.user.id}&ref_by=${sp}`)
            .then(r => r.json()).then(d => {
                document.getElementById('balText').innerText = d.bal.toFixed(4) + " TON";
                document.getElementById('taskText').innerText = d.daily_count + "/15";
                document.getElementById('refText').innerText = d.refs;

                // Update History List
                const hList = document.getElementById('historyList');
                if(d.payouts && d.payouts.length > 0) {
                    hList.innerHTML = d.payouts.map(p => `
                        <div class="history-item">
                            <span>${p.date}: <b>${p.amt} TON</b></span>
                            <span class="status-${p.status.toLowerCase()}">${p.status}</span>
                        </div>
                    `).join('');
                }
            });
    }
</script>
