<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TON Earner Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #00b4d8; --bg: #0a0a0a; --card: #161616; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; text-align: center; padding: 20px; margin: 0; }
        .card { background: var(--card); border-radius: 24px; padding: 30px 20px; border: 1px solid #333; max-width: 360px; margin: 20px auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 14px; width: 100%; font-size: 17px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-bottom: 12px; }
        .btn:active { transform: scale(0.98); opacity: 0.9; }
        .btn:disabled { background: #444; cursor: not-allowed; }
        .btn-bonus { background: #f7931a; }
        #status { font-size: 13px; color: #888; margin-top: 15px; font-style: italic; }
        .icon { font-size: 50px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <div class="icon">💎</div>
        <h1>TON Earner</h1>
        <p style="color: #bbb; font-size: 14px;">Watch ads to earn real TON tokens.</p>
        
        <button class="btn btn-bonus" id="bonusBtn" onclick="claimDaily()">🎁 CLAIM DAILY BONUS</button>
        <button class="btn" id="adBtn" onclick="startAdFlow()">🚀 WATCH AD (+0.001 TON)</button>
        
        <div id="status">Initializing Secure Ad Network...</div>
    </div>
