<script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>
<script>
    const tg = window.Telegram.WebApp;
    tg.ready();

    function startAdFlow() {
        alert("Phase 1: Button Clicked"); // DEBUG ALERT
        const btn = document.getElementById('adBtn');
        btn.disabled = true;

        try {
            const controller = new TelegramAdsController();
            alert("Phase 2: Controller Created"); // DEBUG ALERT
            
            controller.initialize({
                pubId: "76092",
                appId: "6586",
            });

            controller.showAd({
                type: 'rewarded',
                onComplete: () => {
                    alert("Phase 3: Ad Finished!"); // DEBUG ALERT
                    finalizeReward();
                    btn.disabled = false;
                },
                onError: (err) => {
                    alert("Ad Network Error: " + JSON.stringify(err));
                    // Try the more reliable 'pop' format if video fails
                    controller.showAd({ type: 'pop', onComplete: () => finalizeReward() });
                    btn.disabled = false;
                }
            });
        } catch (e) {
            alert("System Error: " + e.message);
            btn.disabled = false;
        }
    }
</script>
