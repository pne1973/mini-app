<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earn TON</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>
    <script>
        window.TelegramAdsController = new TelegramAdsController();
        window.TelegramAdsController.initialize({
            pubId: "76092",
            appId: "6584",
        });
    </script>

    <style>
        body {
            font-family: sans-serif;
            background-color: #121212;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .btn {
            background: #0088cc;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 20px;
            cursor: pointer;
        }
        .status { margin-top: 20px; color: #888; }
    </style>
</head>
<body>

    <h1>💰 Earn TON</h1>
    <p>Watch the full ad to claim 0.01 TON</p>
    
    <button class="btn" onclick="playAd()">🚀 Watch Ad Now</button>
    <div id="status" class="status">Ready</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();

        function playAd() {
            document.getElementById('status').innerText = "Loading ad...";

            // Trigger the RichAds Interstitial/Rewarded ad
            window.TelegramAdsController.showAd({
                type: 'interstitial', // or 'rewarded' depending on your RichAds setup
                onComplete: () => {
                    document.getElementById('status').innerText = "Ad finished! Saving reward...";
                    rewardUser();
                },
                onSkipped: () => {
                    tg.showAlert("You skipped the ad! No reward granted.");
                    document.getElementById('status').innerText = "Skipped.";
                },
                onError: (err) => {
                    tg.showAlert("No ads available right now. Try later!");
                    console.error(err);
                }
            });
        }

        function rewardUser() {
            const userId = tg.initDataUnsafe.user.id;
            
            // !!! REPLACE THIS URL with your actual Render URL !!!
            const renderUrl = `https://telegramadsbot-jzso.onrender.com/reward?user_id=${userId}`;

            fetch(renderUrl)
                .then(res => {
                    tg.showConfirm("Success! 0.01 TON added to your balance.", () => {
                        tg.close(); // Close app and return to chat
                    });
                })
                .catch(err => {
                    tg.showAlert("Server busy. Reward will be added soon!");
                });
        }
    </script>
</body>
</html>
