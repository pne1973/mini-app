<script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();

    // Initialize the Controller with your specific IDs
    const controller = new TelegramAdsController();
    controller.initialize({
        pubId: "76092",
        appId: "6586", // Your updated ID
    });

    function startAdFlow() {
        const btn = document.getElementById('adBtn');
        const status = document.getElementById('status');
        
        btn.disabled = true;
        status.innerText = "Loading Ad...";

        controller.showAd({
            type: 'rewarded', // Tries the Video Ad first
            onComplete: () => {
                status.innerText = "Success! Verifying...";
                finalizeReward();
                btn.disabled = false;
            },
            onError: (err) => {
                console.log("Video failed, trying Popup fallback...");
                // Emergency Fallback: Popup ads almost always work!
                controller.showAd({ 
                    type: 'pop', 
                    onComplete: () => {
                        finalizeReward();
                        btn.disabled = false;
                    } 
                });
            }
        });
    }

    function finalizeReward() {
        const uid = tg.initDataUnsafe.user.id;
        // Connects to your Render server
        fetch(`https://telegramadsbot-jzso.onrender.com/reward?user_id=${uid}`)
            .then(r => {
                if(r.ok) {
                    tg.showAlert("💰 +0.001 TON added to your balance!");
                    document.getElementById('status').innerText = "Ready for next ad";
                }
            })
            .catch(() => tg.showAlert("Server error. But don't worry, we'll try to sync later."));
    }
</script>

<button id="adBtn" class="btn" onclick="startAdFlow()">🚀 WATCH AD</button>
<div id="status">Ready</div>
