<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root { --gold: #f1c40f; --blue: #0088cc; --purple: #9b59b6; --bg: #0a0f14; --card: #151c26; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        
        #admBadge { background: var(--gold); color: black; font-size: 10px; font-weight: 800; padding: 5px 12px; border-radius: 20px; align-self: center; display: none; cursor: pointer; }

        .card { background: var(--card); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; padding: 18px; text-align: center; box-shadow: 0 8px 20px rgba(0,0,0,0.4); }
        .ton-val { font-size: 3rem; font-weight: 900; color: var(--gold); margin: 5px 0; }
        
        .bar-bg { height: 8px; background: #000; border-radius: 10px; overflow: hidden; margin: 8px 0; }
        .xp-fill { height: 100%; background: var(--purple); transition: width 0.5s; }
        .energy-fill { height: 100%; background: var(--gold); transition: width 0.5s; box-shadow: 0 0 8px var(--gold); }
        .wd-fill { height: 100%; background: #2ecc71; transition: width 0.5s; }

        .rank-row { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 0.85rem; }

        .footer { background: #111821; padding: 18px; border-top: 1px solid rgba(255,255,255,0.1); border-radius: 25px 25px 0 0; }
        .btn-main { background: var(--blue); border: none; padding: 16px; border-radius: 18px; width: 100%; font-weight: 800; color: white; font-size: 1.1rem; margin-bottom: 12px; box-shadow: 0 4px 12px rgba(0,136,204,0.3); }
        .btn-main:disabled { opacity: 0.6; }

        .btn-group { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .btn-sub { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); color: white; padding: 10px 5px; border-radius: 12px; font-size: 0.75rem; display: flex; flex-direction: column; align-items: center; gap: 4px; }
    </style>
</head>
<body>

<div class="container">
    <div id="admBadge" onclick="showAdmin()">👑 MASTER ADMIN</div>

    <div class="card">
        <div class="d-flex justify-content-between small opacity-50">
            <span>LEVEL <b id="lvl">1</b></span>
            <span>XP <b id="xpT">0/100</b></span>
        </div>
        <div class="bar-bg"><div id="xpB" class="xp-fill" style="width: 0%"></div></div>
        
        <small class="opacity-50">ESTIMATED BALANCE</small>
        <div class="ton-val" id="bal">0.0000</div>
        
        <div class="bar-bg" style="height: 4px;"><div id="wdB" class="wd-fill" style="width: 0%"></div></div>
        <small class="opacity-30" style="font-size: 9px;">Withdraw at 0.5 TON</small>
    </div>

    <div class="card">
        <h6 class="small opacity-50 mb-2"><i class="bi bi-trophy"></i> TOP LÍDERES</h6>
        <div id="leaderboard"></div>
    </div>
</div>

<div class="footer">
    <div class="d-flex justify-content-between small mb-1">
        <span class="opacity-50">⚡ ENERGY</span>
        <span id="nrgT">--/10</span>
    </div>
    <div class="bar-bg mb-3"><div id="nrgB" class="energy-fill"></div></div>

    <button id="spinBtn" class="btn-main" onclick="handleSpin()">
        <i class="bi bi-play-circle-fill"></i> SPIN & EARN
    </button>
    
    <div class="btn-group">
        <button class="btn-sub" onclick="showHelp()"><i class="bi bi-info-circle"></i>HELP</button>
        <button class="btn-sub" onclick="claimDaily()"><i class="bi bi-gift"></i>DAILY</button>
        <button class="btn-sub" onclick="requestWithdraw()"><i class="bi bi-wallet2"></i>CASH</button>
        <button class="btn-sub" onclick="shareInvite()"><i class="bi bi-people"></i>INVITE</button>
    </div>
</div>

<script>
    const tele = window.Telegram.WebApp;
    const user = tele.initDataUnsafe.user || {id: "5401881400"};
    const R_URL = "https://telegramadsbot-jzso.onrender.com";

    async function init() {
        if(String(user.id) === "5401881400") document.getElementById('admBadge').style.display = 'block';
        const r = await fetch(`${R_URL}/check_eligibility?user_id=${user.id}`);
        updateUI(await r.json());
        
        const lr = await fetch(`${R_URL}/get_leaderboard`);
        const leaders = await lr.json();

            html += `<div class="rank-row"><span>#${i+1} ID:${u.uid.slice(0,5)}</span><b>${u.balance.toFixed(4)}</b></div>`;
        });
        document.getElementById('leaderboard').innerHTML = html;
        tele.expand();
    }
