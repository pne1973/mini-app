<script>
    const tele = window.Telegram.WebApp;
    tele.expand(); // Abre a app em ecrã total
    
    // Identificação do Utilizador
    const user = tele.initDataUnsafe.user || {id: "5401881400"}; // Fallback para o teu ID em testes
    const ADMIN_ID = "5401881400";
    
    // O TEU URL REAL DO RENDER (Confirmado)
    const R_URL = "https://telegramadsbot-jzso.onrender.com";

    const AD_URL = "https://www.profitablecpmratenetwork.com/hik7av4u?key=a5a57d96e63b358a8e7549b51cab45af";

    async function load() {
        console.log("Iniciando carga para o ID:", user.id);

        // 👑 ATIVAÇÃO DO PAINEL DE ADMIN
        if (String(user.id) === ADMIN_ID) {
            document.getElementById('adminPanel').style.display = 'block';
        }

        try {
            // Procura os dados no servidor do Render
            const res = await fetch(`${R_URL}/check_eligibility?user_id=${user.id}`);
            const data = await res.json();
            
            // Atualiza a Interface com os dados Reais do Supabase
            document.getElementById('bal').innerText = data.balance.toFixed(4);
            document.getElementById('lvl').innerText = data.level;
            document.getElementById('nrg').innerText = data.energy + "/10";
            document.getElementById('tix').innerText = data.tickets || 0;
            document.getElementById('refs').innerText = (data.ref_count || 0) + "/3";
            
            // Barra de XP (cada 100 XP sobe um nível)
            document.getElementById('xpFill').style.width = (data.xp % 100) + "%";

            // Se for Admin, carrega os lucros globais
            if (String(user.id) === ADMIN_ID) {
                const admRes = await fetch(`${R_URL}/admin_stats?user_id=${user.id}`);
                const admData = await admRes.json();
                document.getElementById('admStats').innerHTML = 
                    `Total Users: <b>${admData.total_users}</b> | Platform Debt: <b>${admData.debt} TON</b>`;
            }
        } catch (error) {
            console.error("Erro ao ligar ao Render:", error);
            if (String(user.id) === ADMIN_ID) {
                document.getElementById('admStats').innerText = "⚠️ Erro: Servidor Render Offline ou Erro de CORS";
            }
        }
    }
