<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #0d1117; color: white; text-align: center; padding: 20px; }
        .card { background: #161b22; border-radius: 15px; padding: 20px; border: 1px solid #30363d; margin-bottom: 20px; }
        .xp-bar { width: 100%; height: 8px; background: #333; border-radius: 4px; margin: 10px 0; overflow: hidden; }
        .xp-fill { height: 100%; background: linear-gradient(90deg, #0088cc, #00ffcc); width: 0%; transition: 0.5s; }
        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin: 10px 0; font-size: 16px; }
        .btn-spin { background: #238636; color: white; }
        .btn-vip { background: #f1c40f; color: black; }
        .badge { font-size: 10px; background: #30363d; padding: 4px 8px; border-radius: 10px; color: #8b949e; }
    </style>
</head>
<body>
    <div id="ton-connect" style="float: right;"></div>
    <div style="clear: both; margin-bottom: 20px;"></div>

    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <span id="rank" class="badge">NOVICE</span>
            <span id="nrg" style="font-size: 12px;">⚡ 0/10</span>
        </div>
        <h1 id="bal" style="font-size: 40px; margin: 10px 0;">0.0000</h1>
        <div class="xp-bar"><div id="xpFill" class="xp-fill"></div></div>
        <div style="display: flex; justify-content: space-between; font-size: 11px; color: #8b949e;">
            <span>Level <span id="lvl">1</span></span>
            <span id="status">Free Member</span>
        </div>
    </div>

    <button class="btn btn-spin" onclick="spin()">🎰 WATCH AD & SPIN</button>
    <button class="btn btn-vip" id="vipBtn" onclick="buyVIP()">👑 ACTIVATE VIP (0.5 TON)</button>
    <button class="btn" style="background: #24292f;" onclick="share()">🚀 INVITE FRIENDS (10%)</button>

    <script>
        const tele = window.Telegram.WebApp;
        const user = tele.initDataUnsafe.user;
        const R_URL = "https://your-render-link.onrender.com"; 
        const WALLET = "UQCkenPqCgi46HS7KggGr_yHYFcPR6qC7gZnY7A-aC2aioS-";

        const tonConnectUI = new TONConnectUI.TonConnectUI({
            manifestUrl: 'https://your-github-io-link/manifest.json', // ⚠️ Update this
            buttonRootId: 'ton-connect'
        });

        async function load() {
            const res = await (await fetch(`${R_URL}/check_eligibility?user_id=${user.id}`)).json();
            document.getElementById('bal').innerText = res.bal.toFixed(4) + " TON";
            document.getElementById('nrg').innerText = "⚡ " + res.energy + "/10";
            document.getElementById('lvl').innerText = res.level;
            document.getElementById('xpFill').style.width = (res.xp % 100) + "%";
            
            if(res.is_vip) {
                document.getElementById('status').innerText = "VIP MEMBER 👑";
                document.getElementById('vipBtn').style.display = "none";
            }

            const ranks = ["Novice", "Earner", "Hustler", "Whale", "King"];
            document.getElementById('rank').innerText = ranks[Math.min(Math.floor(res.level/5), 4)].toUpperCase();
        }

        async function spin() {
            tele.HapticFeedback.impactOccurred('medium');
            window.open("https://your-adsterra-link.com", "_blank"); 
            const res = await fetch(`${R_URL}/reward_spin`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user_id: user.id })
            });
            const data = await res.json();
            if(data.leveled_up) alert("LEVEL UP! 🚀");
            load();
        }

        async function buyVIP() {
            const tx = { validUntil: Math.floor(Date.now()/1000)+600, messages: [{ address: WALLET, amount: "500000000" }] };
            try { await tonConnectUI.sendTransaction(tx); alert("Payment Sent!"); }
            catch(e) { alert("Canceled"); }
        }

        function share() {
            const link = `https://t.me/YourBotName?start=${user.id}`;
            tele.switchInlineQuery(`Join MyEarn and win TON! 🎰\n${link}`);
        }

        load();
        tele.expand();
    </script>
</body>
</html>
