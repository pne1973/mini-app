<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TON Earner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: white; text-align: center; padding: 40px 20px; }
        .card { background: #1a1a1a; border-radius: 20px; padding: 30px; border: 1px solid #333; }
        .btn { background: linear-gradient(135deg, #0088cc, #005580); color: white; border: none; padding: 18px; border-radius: 15px; width: 100%; font-size: 18px; font-weight: bold; cursor: pointer; }
        #status { margin-top: 25px; font-size: 14px; color: #aaa; }
    </style>
</head>
<body>
    <div class="card">
        <h1>💰 Earn TON</h1>
        <p>Watch one ad to get 0.01 TON.</p>
        <button class="btn" onclick="startAdFlow()">🚀 WATCH AD</button>
        <div id="status">Ready</div>
    </div>

    <script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        function startAdFlow() {
            const status = document.getElementById('status');
            const controller = new TelegramAdsController();
            controller.initialize({ pubId: "76092", appId: "6584" });

            status.innerText = "Searching for video...";
            controller.showAd({
                type: 'rewarded',
                onComplete: () => rewardUser(),
                onError: () => {
                    status.innerText = "Video busy, trying static...";
                    controller.showAd({
                        type: 'interstitial',
                        onComplete: () => rewardUser(),
                        onError: () => {
                            status.innerText = "No ads right now. Try later!";
                            tg.showAlert("No ads available in your region yet.");
                        }
                    });
                }
            });
        }

        function rewardUser() {
            const uid = tg.initDataUnsafe.user.id;
            fetch(`https://telegramadsbot-jzso.onrender.com/reward?user_id=${uid}`)
                .then(() => tg.showAlert("Reward Saved! Check your balance in the bot."));
        }
    </script>
</body>
</html>
