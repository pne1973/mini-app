<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://js.onclckvd.com/in-stream-ad-admanager/tma.js"></script>
    
    <style>
        body { background: #0b0e11; color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; text-align: center; margin: 0; padding: 20px; }
        .header { margin-top: 20px; font-weight: bold; font-size: 20px; color: #0088cc; }
        .card { background: #1c1f24; border-radius: 24px; padding: 35px; margin: 30px 0; border: 1px solid #2d333b; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .bal-label { color: #8a919e; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .bal-val { font-size: 38px; color: #ffffff; font-weight: 800; }
        .ton-unit { font-size: 18px; color: #0088cc; margin-left: 5px; }
        #adBtn { background: #0088cc; color: white; border: none; padding: 18px; border-radius: 16px; width: 100%; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        #adBtn:disabled { background: #2d333b; color: #57606a; cursor: not-allowed; }
        #adBtn:active { transform: scale(0.96); }
    </style>
</head>
<body>
    <div class="header">💎 MYEARN TON</div>
    
    <div class="card">
        <div class="bal-label">Current Balance</div>
        <div id="bal" class="bal-val">0.0000<span class="ton-unit">TON</span></div>
    </div>

    <button id="adBtn" onclick="playAd()" disabled>Initializing Ads...</button>

    <script>
        const tele = window.Telegram.WebApp;
        const RENDER_URL = "https://telegramadsbot-jzso.onrender.com";
        const user = tele.initDataUnsafe?.user;

        // 1. Initialize OnClickA with your ID: 432115
        window.initCdTma?.({ id: '432115' })
            .then(show => {
                window.show = show;
                document.getElementById('adBtn').disabled = false;
                document.getElementById('adBtn').innerText = "🎥 Watch Ad & Earn";
            })
            .catch(e => {
                console.error("Ad Engine Failed:", e);
                document.getElementById('adBtn').innerText = "Ads Offline";
            });

        // 2. Fetch User Data
        async function loadData() {
            if (!user) return;
            try {
                const res = await fetch(`${RENDER_URL}/get_user_info?user_id=${user.id}`);
                const data = await res.json();
                document.getElementById('bal').innerHTML = `${data.bal.toFixed(4)}<span class="ton-unit">TON</span>`;
            } catch (e) { console.error("Data Load Error:", e); }
        }

        // 3. Play Ad and Reward
        async function playAd() {
            if (!window.show) return;

            // Show the Ad
            window.show()
                .then(async () => {
                    // Ad finished successfully! Talk to Render.
                    try {
                        const res = await fetch(`${RENDER_URL}/reward?user_id=${user.id}`);
                        const data = await res.json();
                        if (data.status === "ok") {
                            document.getElementById('bal').innerHTML = `${data.new_bal.toFixed(4)}<span class="ton-unit">TON</span>`;
                            tele.HapticFeedback.notificationOccurred('success');
                        }
                    } catch (err) {
                        tele.showAlert("Reward system error. Your progress is saved.");
                    }
                })
                .catch(e => {
                    // User closed the ad too early or error occurred
                    tele.showAlert("Ad not completed. Watch fully to earn TON!");
                });
        }

        // Setup App
        tele.ready();
        tele.expand();
        loadData();
    </script>
</body>
</html>
