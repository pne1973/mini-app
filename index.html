<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MyEarn TON Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { 
            --bg: #0b0f14; 
            --card: #1c222b; 
            --blue: #0088cc; 
            --green: #28a745; 
            --text-dim: #818d99; 
            --gold: #ffaa00;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            background: var(--bg);
            color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 20px 16px;
        }

        .app-container {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .glass-card { 
            background: var(--card); 
            padding: 24px; 
            border-radius: 24px; 
            border: 1px solid rgba(255,255,255,0.05); 
            margin-bottom: 16px; 
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
        }

        .tabs { 
            display: flex; 
            gap: 8px; 
            margin-bottom: 20px; 
            background: rgba(0,0,0,0.3); 
            padding: 5px; 
            border-radius: 16px;
            width: 100%;
        }

        .tab { 
            flex: 1; 
            padding: 12px; 
            border-radius: 12px; 
            background: transparent; 
            border: none; 
            color: var(--text-dim); 
            font-weight: bold; 
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }

        .tab.active { background: var(--blue); color: #fff; }

        .btn { 
            display: block; 
            width: 100%; 
            padding: 18px; 
            border-radius: 16px; 
            font-weight: bold; 
            border: none; 
            cursor: pointer; 
            font-size: 16px; 
            transition: 0.2s; 
            margin-bottom: 10px; 
            text-decoration: none; 
            color: #fff;
            text-align: center;
        }
        
        /* FIXED THE BROKEN CSS HERE */
        .btn-blue { background: var(--blue); }
        .btn-green { background: var(--green); }

        .btn:active { transform: scale(0.98); opacity: 0.9; }

        .tab-content { display: none; width: 100%; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="tabs">
        <button class="tab active" onclick="showTab('earn')">Earn</button>
        <button class="tab" onclick="showTab('wallet')">Wallet</button>
    </div>

    <div id="earn" class="tab-content active">
        <div class="glass-card">
            <h2 style="color: var(--gold)">0.00 TON</h2>
            <p style="color: var(--text-dim)">Ready to claim</p>
        </div>
        <button class="btn btn-blue" onclick="handleClaim()">Claim Rewards</button>
    </div>

    <div id="wallet" class="tab-content">
        <div class="glass-card">
            <p>Connect your TON wallet to withdraw.</p>
        </div>
        <button class="btn btn-green">Connect Wallet</button>
    </div>
</div>

<script>
    // Initialize Telegram Web App
    const tg = window.Telegram.WebApp;
    tg.expand(); // Opens the app to full height

    function showTab(tabId) {
        // Remove active class from all tabs and contents
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        
        // Add active class to selected
        event.currentTarget.classList.add('active');
        document.getElementById(tabId).classList.add('active');
        
        // Haptic feedback for Telegram
        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
    }

    function handleClaim() {
        confetti({
            particleCount: 100,
            spread: 70,
            origin: { y: 0.6 },
            colors: ['#0088cc', '#ffffff', '#ffaa00']
        });
    }
</script>

</body>
</html>
