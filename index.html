<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #1a1a1a; color: white; text-align: center; font-family: sans-serif; padding: 20px; }
        .card { background: #2a2a2a; padding: 20px; border-radius: 15px; margin: 20px 0; border: 1px solid #444; }
        .balance { font-size: 32px; color: #0088cc; font-weight: bold; }
        button { background: #0088cc; color: white; border: none; padding: 15px 30px; border-radius: 10px; width: 100%; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>💎 MyEarn TON</h1>
    <div class="card">
        <p>Your Balance</p>
        <div id="bal" class="balance">0.0000 TON</div>
    </div>
    <button onclick="getReward()">Watch Ad & Earn</button>

    <script>
        const tele = window.Telegram.WebApp;
        tele.expand();
        tele.ready();

        const user = tele.initDataUnsafe?.user;
        const RENDER_URL = "https://telegramadsbot-jzso.onrender.com";

        async function loadData() {
            if (!user) return;
            try {
                const res = await fetch(`${RENDER_URL}/get_user_info?user_id=${user.id}`);
                const data = await res.json();
                document.getElementById('bal').innerText = data.bal + " TON";
            } catch (e) { console.error("Server Error:", e); }
        }

        async function getReward() {
            if (!user) return alert("Open in Telegram!");
            try {
                const res = await fetch(`${RENDER_URL}/reward?user_id=${user.id}`);
                const data = await res.json();
                if (data.status === "ok") {
                    document.getElementById('bal').innerText = data.new_bal + " TON";
                    tele.HapticFeedback.notificationOccurred('success');
                }
            } catch (e) { alert("Server Busy"); }
        }

        loadData();
    </script>
</body>
</html>
