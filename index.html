<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    function startAdFlow() {
        const btn = document.getElementById('adBtn');
        btn.innerText = "Loading Ad...";
        btn.disabled = true;

        // Your Adsterra SmartLink
        const adUrl = "https://www.effectivegatecpm.com/hik7av4u?key=a5a57d96e63b358a8e7549b51cab45af";

        // 1. Open the Ad
        tg.openLink(adUrl);

        // 2. Reward the user via your Render backend
        const userId = tg.initDataUnsafe.user?.id || "test_user";
        
        fetch(`https://telegramadsbot-jzso.onrender.com/reward?user_id=${userId}`)
            .then(response => {
                if(response.ok) {
                    tg.showAlert("💰 Success! +0.001 TON added to your balance.");
                } else {
                    tg.showAlert("⚠️ Ad opened, but reward server is busy. Try again!");
                }
                btn.innerText = "💰 EARN TON";
                btn.disabled = false;
            })
            .catch(err => {
                console.error(err);
                tg.showAlert("Connect error. Check your internet!");
                btn.innerText = "💰 EARN TON";
                btn.disabled = false;
            });
    }
</script>

<div style="text-align: center; margin-top: 50px;">
    <button id="adBtn" onclick="startAdFlow()" style="padding: 20px 40px; font-size: 20px; background: #0088cc; color: white; border: none; border-radius: 10px; cursor: pointer; width: 80%;">
        💰 EARN TON
    </button>
</div>
