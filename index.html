<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Earn TON</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding: 20px; }
        .btn { background: #0088cc; color: white; border: none; padding: 20px; border-radius: 12px; width: 80%; font-size: 18px; font-weight: bold; }
        #log { margin-top: 20px; font-size: 12px; color: #ffcc00; }
    </style>
</head>
<body>
    <h1>💰 Earn TON</h1>
    <button class="btn" onclick="startAdProcess()">WATCH AD</button>
    <div id="log">Status: Waiting for click...</div>

    <script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        function startAdProcess() {
            const logDiv = document.getElementById('log');
            logDiv.innerText = "Step 1: Checking SDK...";

            if (typeof TelegramAdsController === 'undefined') {
                alert("Error: RichAds script failed to load. Check your internet or ad-blocker.");
                return;
            }

            logDiv.innerText = "Step 2: Initializing...";
            const controller = new TelegramAdsController();
            controller.initialize({ pubId: "76092", appId: "6584" });

            logDiv.innerText = "Step 3: Requesting Ad...";
            
            controller.showAd({
                type: 'rewarded',
                onComplete: () => {
                    logDiv.innerText = "Step 4: Success! Paying...";
                    const uid = tg.initDataUnsafe.user.id;
                    fetch(`https://telegramadsbot-jzso.onrender.com/reward?user_id=${uid}`)
                        .then(() => alert("Success! TON added."));
                },
                onError: (err) => {
                    logDiv.innerText = "Error: " + JSON.stringify(err);
                    alert("No ads available right now.");
                }
            });
        }
    </script>
</body>
</html>
