<div class="btn-group">
    <button class="btn-sub" onclick="showHelp()"><i class="bi bi-info-circle"></i>HELP</button>
    <button class="btn-sub" onclick="claimDaily()"><i class="bi bi-gift"></i>DAILY</button>
    <button class="btn-sub" onclick="withdraw()"><i class="bi bi-wallet2"></i>CASH</button>
    <button class="btn-sub" onclick="shareInvite()"><i class="bi bi-people"></i>INVITE</button>
</div>

<script>
async function claimDaily() {
    const res = await fetch(`${R_URL}/claim_daily`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({user_id: user.id})
    });
    const d = await res.json();
    if(d.error) {
        tele.showAlert(d.error);
    } else {
        tele.showAlert(d.success);
        load(); // Atualiza o saldo no ecrã
    }
}
</script>
