<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MyEarn TON Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { 
            --bg: #0b0f14; 
            --card: #1c222b; 
            --blue: #0088cc; 
            --green: #28a745; 
            --text-dim: #818d99; 
            --gold: #ffaa00;
        }

        /* RESET & CENTER LOGIC */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body { 
            height: 100%; 
            width: 100%;
            background: var(--bg);
            overflow-x: hidden;
            display: flex;
            justify-content: center; /* Centers horizontally */
        }

        body { 
            color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding: 20px 16px;
        }

        /* MAIN WRAPPER - This makes it look like a centered app */
        .app-container {
            width: 100%;
            max-width: 420px; /* Perfect width for Telegram mobile */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* GLASS CARD STYLING */
        .glass-card { 
            background: var(--card); 
            padding: 24px; 
            border-radius: 24px; 
            border: 1px solid rgba(255,255,255,0.05); 
            margin-bottom: 16px; 
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
        }

        /* TABS */
        .tabs { 
            display: flex; 
            gap: 8px; 
            margin-bottom: 20px; 
            background: rgba(0,0,0,0.3); 
            padding: 5px; 
            border-radius: 16px;
            width: 100%;
        }
        .tab { 
            flex: 1; 
            padding: 12px; 
            border-radius: 12px; 
            background: transparent; 
            border: none; 
            color: var(--text-dim); 
            font-weight: bold; 
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }
        .tab.active { background: var(--blue); color: #fff; }

        /* BUTTONS */
        .btn { 
            display: block; 
            width: 100%; 
            padding: 18px; 
            border-radius: 16px; 
            font-weight: bold; 
            border: none; 
            cursor: pointer; 
            font-size: 16px; 
            transition: 0.2s; 
            margin-bottom: 10px; 
            text-decoration: none; 
            color: #fff;
            text-align: center;
        }
