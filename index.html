<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TON EMPIRE 2026</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #0d1117; color: white; font-family: 'Segoe UI', sans-serif; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 20px; padding: 20px; margin-top: 15px; }
        .xp-bar { width: 100%; height: 8px; background: #30363d; border-radius: 10px; margin: 10px 0; }
        .xp-fill { height: 100%; background: #238636; border-radius: 10px; width: 0%; transition: 1s; }
        .btn-main { background: linear-gradient(45deg, #0088cc, #00d4ff); border: none; font-weight: 900; padding: 18px; width: 100%; border-radius: 15px; color: white; box-shadow: 0 4px 15px rgba(0,136,204,0.3); }
        .btn-main:disabled { opacity: 0.6; background: #30363d; }
        .btn-daily { background: #f1c40f; color: black; font-weight: bold; border: none; border-radius: 10px; width: 100%; padding: 10px; margin-bottom: 10px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% {transform:scale(1)} 50% {transform:scale(1.03)} 100% {transform:scale(1)} }
        #adminPanel { border: 2px solid #f1c40f; display: none; }
    </style>
</head>
<body>

    <div class="container py-4">
        <div id="adminPanel" class="card">
            <h5 class="text-warning">👑 ADMIN CONSOLE</h5>
            <p id="admStats" class="small m-0">Loading system data...</p>
        </div>

        <div class="text-center">
            <h2 class="fw-bold">💎 TON EMPIRE</h2>
            <p class="text-muted small">Global Ad-Earning Platform</p>
        </div>

        <div class="card shadow">
            <div class="d-flex justify-content-between small text-muted">
                <span>LEVEL <b id="lvl" class="text-white">1</b></span>
                <span>ENERGY: <b id="nrg" class="text-white">10/10</b></span>
            </div>
            <div class="xp-bar"><div id="xpFill" class="xp-fill"></div></div>
            <h1 class="my-3"><span id="bal">0.0000</span> <small class="fs-6">TON</small></h1>
        </div>

        <div class="mt-4">
            <button class="btn-daily" onclick="claimDaily()">🎁 DAILY BONUS (+50 XP)</button>
            <button id="spinBtn" class="btn-main" onclick="startSpin()">🎰 SPIN & EARN (15s AD)</button>
        </div>

        <div class="mt-3 d-flex gap-2">
            <button class="btn btn-outline-light w-50 py-3" onclick="share()">🔗 INVITE</button>
            <button class="btn btn-outline-light w-50 py-3" onclick="withdraw()">💸 WITHDRAW</button>
        </div>

        <div class="mt-4 text-center small text-muted">
            Tickets: <b id="tix" class="text-white">0</b> | 
            Referrals: <b id="refs" class="text-white">0/3</b>
        </div>
    </div>

    <script>
        const tele = window.Telegram.WebApp;
        tele.expand();
        const user = tele.initDataUnsafe.user || {id: "5401881400", first_name: "Tester"}; // Fallback para teste
        const R_URL = "TEU_URL_DO_RENDER"; 
        const AD_URL = "https://www.profitablecpmratenetwork.com/hik7av4u?key=a5a57d96e63b358a8e7549b51cab45af";

        async function load() {
            try {
                const res = await (await fetch(`${R_URL}/check_eligibility?user_id=${user.id}`)).json();
                document.getElementById('bal').innerText = res.balance.toFixed(4);
                document.getElementById('lvl').innerText = res.level;
                document.getElementById('nrg').innerText = res.energy + "/10";
                document.getElementById('tix').innerText = res.tickets;
                document.getElementById('refs').innerText = res.ref_count + "/3";
                document.getElementById('xpFill').style.width = (res.xp % 100) + "%";

                if(user.id == "5401881400") {
                    document.getElementById('adminPanel').style.display = 'block';
                    const adm = await (await fetch(`${R_URL}/admin_stats?user_id=${user.id}`)).json();
                    document.getElementById('admStats').innerText = `Total Users: ${adm.total_users} | Platform Debt: ${adm.debt} TON`;
                }
            } catch(e) { console.error("Sync Error"); }
        }

        async function startSpin() {
            window.open(AD_URL, '_blank');
            const btn = document.getElementById('spinBtn');
            btn.disabled = true;
            let timer = 15;
            
            const interval = setInterval(() => {
                btn.innerText = `WAITING AD... ${timer}s`;
                if(timer-- <= 0) {
                    clearInterval(interval);
                    finishSpin();
                }
            }, 1000);
        }

        async function finishSpin() {
            const res = await fetch(`${R_URL}/reward_spin`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({user_id: user.id})
            });
            const data = await res.json();
            if(data.win) tele.showConfirm(`🎉 Awesome! You earned ${data.win.toFixed(5)} TON`);
            document.getElementById('spinBtn').innerText = "🎰 SPIN & EARN (15s AD)";
            document.getElementById('spinBtn').disabled = false;
            load();
        }

        async function claimDaily() {
            const res = await fetch(`${R_URL}/daily_checkin`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({user_id: user.id})
            });
            const data = await res.json();
            tele.showAlert(data.msg);
            load();
        }

        function share() {
            const text = encodeURIComponent("🎰 I'm earning real TON for free! Join the Empire: ");
            const url = `https://t.me/Myearnbot2026_bot?start=${user.id}`;
            tele.switchInlineQuery(`${text}\n${url}`);
        }

        function withdraw() {
            tele.showAlert("Withdrawals unlock at 0.1 TON + 3 active referrals!");
        }

        load();
    </script>
</body>
</html>
