<head>
    <script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>
    
    <script>
        // 2. Initialize it immediately in a global variable
        let adController;
        
        // This function runs automatically as soon as the page is ready
        window.onload = function() {
            try {
                adController = new TelegramAdsController();
                adController.initialize({
                    pubId: "76092",
                    appId: "6586"
                });
                console.log("Rich Ads Ready");
            } catch (e) {
                console.error("SDK Initialization failed");
            }
        };

        function startAdFlow() {
            // Check if SDK actually loaded
            if (!adController) {
                alert("Ad Network still loading... please wait 3 seconds.");
                return;
            }

            // Trigger the ad
            adController.showAd({
                type: 'rewarded',
                onComplete: () => {
                    // This is where you call your Render backend
                    fetch('https://telegramadsbot-jzso.onrender.com/reward?user_id=' + window.Telegram.WebApp.initDataUnsafe.user.id);
                    window.Telegram.WebApp.showAlert("✅ Success! TON added.");
                },
                onError: (err) => {
                    // If video fails, force a popup (popups almost never fail)
                    adController.showAd({ type: 'pop' });
                }
            });
        }
    </script>
</head>

<body>
    <button class="btn" onclick="startAdFlow()">💰 EARN TON</button>
</body>
