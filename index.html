<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #0d1117; color: white; text-align: center; padding: 15px; }
        .card { background: #161b22; border-radius: 15px; padding: 15px; border: 1px solid #30363d; margin-bottom: 15px; }
        .xp-bar { width: 100%; height: 6px; background: #333; border-radius: 3px; margin: 10px 0; overflow: hidden; }
        .xp-fill { height: 100%; background: #0088cc; width: 0%; transition: 0.5s; }
        .btn { width: 100%; padding: 14px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin: 5px 0; }
        .btn-spin { background: #238636; color: white; }
        .btn-gold { background: #f1c40f; color: black; }
        .shoutbox { font-size: 11px; background: #000; padding: 5px; border-radius: 5px; height: 50px; overflow: hidden; color: #00ffcc; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="ton-connect" style="display:flex; justify-content:flex-end;"></div>
    
    <div class="card">
        <div style="display:flex; justify-content:space-between; font-size:12px;">
            <span id="rank" style="color:#8b949e">NOVICE</span>
            <span id="nrg">⚡ 0/10</span>
        </div>
        <h1 id="bal">0.0000 TON</h1>
        <div class="xp-bar"><div id="xpFill" class="xp-fill"></div></div>
        <div style="display:flex; justify-content:space-between; font-size:10px; color:#8b949e">
            <span>LVL <span id="lvl">1</span></span>
            <span>TICKETS: <span id="tix">0</span> 🎫</span>
        </div>
        <div class="shoutbox" id="shout">Loading Live Shoutbox...</div>
    </div>

    <button class="btn btn-spin" id="spinBtn" onclick="startAdSpin()">🎰 WATCH AD & SPIN (15s)</button>
    <button class="btn btn-gold" onclick="ticketSpin()">🎫 USE GOLDEN TICKET (5x WIN)</button>
    <button class="btn" style="background:#24292f" onclick="share()">🚀 SHARE FOR +5 ENERGY</button>
    <button class="btn" style="background:#0088cc" onclick="openLeaderboard()">🏆 LEADERBOARD</button>

    <script>
        const tele = window.Telegram.WebApp;
        const user = tele.initDataUnsafe.user;
        const R_URL = "https://your-app.onrender.com";
        const AD_LINK = "https://peltas.com/130103/1781442";

        async function load() {
            const res = await (await fetch(`${R_URL}/check_eligibility?user_id=${user.id}&ref=${tele.initDataUnsafe.start_param || ""}`)).json();
            document.getElementById('bal').innerText = res.bal.toFixed(4) + " TON";
            document.getElementById('nrg').innerText = "⚡ " + res.energy + "/10";
            document.getElementById('tix').innerText = res.tickets;
            document.getElementById('lvl').innerText = res.level;
            document.getElementById('xpFill').style.width = (res.xp % 100) + "%";
            
            // Load Shoutbox
            const s = await (await fetch(`${R_URL}/shoutbox`)).json();
            document.getElementById('shout').innerHTML = s.map(m => `<div>User${m.uid.slice(-3)}: ${m.msg}</div>`).join("");
        }

        function startAdSpin() {
            window.open(AD_LINK, "_blank");
            let sec = 15;
            const btn = document.getElementById('spinBtn');
            btn.disabled = true;
            const timer = setInterval(async () => {
                btn.innerText = `WAIT ${sec}s...`;
                if(sec-- < 0) {
                    clearInterval(timer);
                    await fetch(`${R_URL}/reward_spin`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({user_id:user.id})});
                    btn.disabled = false; btn.innerText = "🎰 WATCH AD & SPIN (15s)";
                    load();
                }
            }, 1000);
        }

        async function ticketSpin() {
            const res = await fetch(`${R_URL}/reward_spin`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({user_id:user.id, use_ticket:true})});
            const d = await res.json();
            if(d.error) tele.showAlert("No Golden Tickets!");
            else load();
        }

        function share() {
            tele.switchInlineQuery(`Win TON! Join me: https://t.me/YourBot?start=${user.id}`);
            // Logic to grant +5 energy can be added to backend /share endpoint
        }

        load(); tele.expand(); tele.ready();
    </script>
</body>
</html>
