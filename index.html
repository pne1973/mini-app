<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root { --gold: #f1c40f; --blue: #0088cc; --purple: #9b59b6; --bg: #050a10; --card: #151c26; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .container { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        #admBadge { background: linear-gradient(45deg, var(--gold), #d4af37); color: black; font-size: 10px; font-weight: 800; padding: 8px 20px; border-radius: 20px; display: none; align-self: center; margin-bottom: 5px; cursor: pointer; }
        .card { background: var(--card); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; padding: 20px; text-align: center; }
        .ton-val { font-size: 3rem; font-weight: 900; color: var(--gold); margin: 5px 0; }
        .bar-bg { height: 8px; background: #000; border-radius: 10px; overflow: hidden; margin: 10px 0; }
        .xp-fill { height: 100%; background: var(--purple); width: 0%; transition: width 0.5s; }
        .nrg-fill { height: 100%; background: var(--gold); width: 0%; transition: width 0.5s; }
        .wd-fill { height: 100%; background: #2ecc71; width: 0%; transition: width 0.5s; }
        .footer { background: #0d121a; padding: 20px; border-top: 1px solid rgba(255,255,255,0.1); border-radius: 30px 30px 0 0; }
        .btn-main { background: var(--blue); border: none; padding: 18px; border-radius: 18px; width: 100%; font-weight: 800; color: white; font-size: 1.1rem; margin-bottom: 15px; }
        .btn-group { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .btn-sub { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 10px 5px; border-radius: 12px; font-size: 0.7rem; display: flex; flex-direction: column; align-items: center; gap: 5px; }
    </style>
</head>
<body>

<div class="container">
    <center><div id="admBadge" onclick="showAdmin()">👑 MASTER ADMIN</div></center>
    <div class="card">
        <div class="d-flex justify-content-between small mb-1 opacity-50">
            <span>LVL <b id="lvlVal">1</b></span>
            <span>XP <b id="xpText">0/100</b></span>
        </div>
        <div class="bar-bg"><div id="xpBar" class="xp-fill"></div></div>
        <small class="opacity-50">ESTIMATED BALANCE</small>
        <div class="ton-val" id="bal">0.0000</div>
        <div class="bar-bg" style="height: 4px;"><div id="wdBar" class="wd-fill"></div></div>
        <small class="opacity-30" style="font-size: 10px;">Withdraw at 0.5 TON + 3 Invites</small>
    </div>
    <div class="card"><h6 class="opacity-50 small mb-3">TOP LÍDERES</h6><div id="leaderboard"></div></div>
</div>

<div class="footer">
    <div class="d-flex justify-content-between small mb-1">
        <span class="opacity-50">⚡ ENERGY</span>
        <span id="nrgText">--/--</span>
    </div>
    <div class="bar-bg mb-3"><div id="nrgBar" class="nrg-fill"></div></div>
    <button id="spinBtn" class="btn-main" onclick="handleSpin()">SPIN & EARN</button>
    <div class="btn-group">
        <button class="btn-sub" onclick="showHelp()"><i class="bi bi-patch-question"></i>INFO</button>
        <button class="btn-sub" onclick="energyRefill()"><i class="bi bi-lightning-charge"></i>ENERGY</button>
        <button class="btn-sub" onclick="withdraw()"><i class="bi bi-wallet2"></i>CASH</button>
        <button class="btn-sub" onclick="shareInvite()"><i class="bi bi-people"></i>INVITE</button>
    </div>
</div>

<script>
    const tele = window.Telegram.WebApp;
    const user = tele.initDataUnsafe.user || {id: 5401881400};
    const startParam = tele.initDataUnsafe.start_param || "None";
    const refBy = startParam.replace('ref_', '');
    const R_URL = "https://telegramadsbot-jzso.onrender.com";
    const AD_LINK = "https://www.profitablecpmratenetwork.com/hik7av4u?key=a5a57d96e63b358a8e7549b51cab45af";

    async function load() {
        if(Number(user.id) === 5401881400) document.getElementById('admBadge').style.display = 'block';
        const r = await fetch(`${R_URL}/check_eligibility?user_id=${user.id}&ref_by=${refBy}`);
        updateUI(await r.json());
        const lr = await fetch(`${R_URL}/get_leaderboard`);
        const leaders = await lr.json();
        let html = "";
        leaders.forEach((u, i) => {
            html += `<div style="display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid #222; font-size:0.8rem;"><span>#${i+1} ID:${u.uid.slice(0,5)}</span><b>${u.balance.toFixed(4)}</b></div>`;
        });
        document.getElementById('leaderboard').innerHTML = html;
        tele.expand();
    }

    function updateUI(d) {
        document.getElementById('bal').innerText = d.balance.toFixed(4);
        document.getElementById('lvlVal').innerText = d.level;
        document.getElementById('xpBar').style.width = (d.xp || 0) + "%";
        document.getElementById('xpText').innerText = (d.xp || 0) + "/100";
        let max = 10 + (Math.floor(d.level / 5) * 2);
        document.getElementById('nrgText').innerText = d.energy + "/" + max;
        document.getElementById('nrgBar').style.width = (d.energy / max * 100) + "%";
        document.getElementById('wdBar').style.width = Math.min((d.balance / 0.5) * 100, 100) + "%";
    }

    function handleSpin() {
        let nrg = parseInt(document.getElementById('nrgText').innerText);
        if(nrg <= 0) { tele.showAlert("⚡ Sem Energia! Vê um anúncio no botão ENERGY."); return; }
        window.open(AD_LINK, '_blank');
        let btn = document.getElementById('spinBtn'); btn.disabled = true;
        let t = 15;
        let timer = setInterval(async () => {
            btn.innerHTML = `WAIT ${t}s`;
            if(t-- <= 0) {
                clearInterval(timer);
                const res = await fetch(`${R_URL}/reward_spin`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({user_id: user.id}) });
                const data = await res.json();
                if(data.error) tele.showAlert(data.error); else updateUI(data);
                btn.disabled = false; btn.innerHTML = `SPIN & EARN`;
            }
        }, 1000);
    }

    function energyRefill() {
        tele.showConfirm("Recarregar +5 de Energia assistindo a 1 anúncio?", async (c) => {
            if(c) {
                window.open(AD_LINK, '_blank');
                const res = await fetch(`${R_URL}/watch_ads_energy`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({user_id: user.id}) });
                updateUI(await res.json());
                tele.showAlert("⚡ Energia Recarregada!");
            }
        });
    }

    function showHelp() {
        tele.showPopup({
            title: "📖 GUIA DO UTILIZADOR",
            message: "• GANHOS: 0.0002 TON + 10 XP por anúncio.\n• AMIGOS: Ganhas 10% de tudo o que eles minerarem!\n• NÍVEIS: A cada 5 níveis aumentas a tua bateria de energia.\n• SAQUE: Mínimo 0.5 TON + Requisito de 3 convites.",
            buttons: [{type: "close", text: "OK"}]
        });
    }

    async function withdraw() {
        const r = await fetch(`${R_URL}/request_withdraw`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({user_id: user.id}) });
        const d = await r.json(); tele.showAlert(d.error || d.success);
    }

    function shareInvite() { window.open(`https://t.me/share/url?url=https://t.me/O_TEU_BOT?start=ref_${user.id}&text=Ganha TON comigo!`); }
    async function showAdmin() {
        const r = await fetch(`${R_URL}/admin_stats?user_id=${user.id}`);
        const d = await r.json();
        tele.showPopup({ title: "ADMIN", message: `Users: ${d.total_users}\nDebt: ${d.debt.toFixed(4)} TON` });
    }
    load();
</script>
</body>
</html>
