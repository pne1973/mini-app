<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TON EMPIRE 2026</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #0d1117; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 20px; padding: 20px; margin-bottom: 15px; }
        .btn-main { background: linear-gradient(45deg, #0088cc, #00d4ff); border: none; font-weight: 900; padding: 18px; width: 100%; border-radius: 15px; color: white; box-shadow: 0 4px 15px rgba(0,136,204,0.3); }
        .btn-main:disabled { opacity: 0.6; background: #30363d; }
        .xp-bar { width: 100%; height: 8px; background: #30363d; border-radius: 10px; margin: 10px 0; }
        .xp-fill { height: 100%; background: #238636; border-radius: 10px; width: 0%; transition: 1s; }
        #adminPanel { border: 2px solid #f1c40f; display: none; background: #1c2128; }
        h1 { color: #f1c40f; font-weight: bold; margin: 15px 0; }
        .stat-label { font-size: 12px; color: #8b949e; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="adminPanel" class="card">
        <h5 style="color:#f1c40f; margin:0;">👑 ADMIN CONSOLE</h5>
        <p id="admStats" style="font-size: 13px; margin-top:10px;">Connecting to Render...</p>
        <button onclick="load()" style="background:none; border:1px solid #f1c40f; color:#f1c40f; font-size:10px; border-radius:5px;">REFRESH SERVER</button>
    </div>

    <div class="container">
        <div class="text-center mb-4">
            <h2 class="fw-bold">💎 TON EMPIRE</h2>
            <p style="font-size: 12px; color: #8b949e;">Global Ad-Earning Platform</p>
        </div>

        <div class="card shadow">
            <div class="d-flex justify-content-between stat-label">
                <span>LVL: <b id="lvl" class="text-white">1</b></span>
                <span>⚡ ENERGY: <b id="nrg" class="text-white">10/10</b></span>
            </div>
            <div class="xp-bar"><div id="xpFill" class="xp-fill"></div></div>
            <h1><span id="bal">0.0000</span> <small class="fs-6">TON</small></h1>
        </div>

        <div class="mt-4">
            <button id="spinBtn" class="btn-main" onclick="startSpin()">🎰 SPIN & EARN (15s AD)</button>
        </div>

        <div class="mt-3 d-flex gap-2">
            <button class="btn btn-outline-light w-50 py-3" onclick="share()">🔗 INVITE</button>
            <button class="btn btn-outline-light w-50 py-3" onclick="alert('Min: 0.1 TON + 3 Refs')">💸 WITHDRAW</button>
        </div>

        <div class="mt-4 text-center small text-muted">
            Tickets: <b id="tix" class="text-white">0</b> | 
            Referrals:
