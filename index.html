<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earn TON</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding-top: 50px; }
        .btn { background: #0088cc; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-size: 18px; cursor: pointer; }
        .status { margin-top: 20px; color: #888; font-size: 14px; }
    </style>
</head>
<body>
    <h1>💰 Earn TON</h1>
    <button class="btn" id="adBtn" onclick="playAd()">🚀 Watch Ad Now</button>
    <div id="status" class="status">Initializing SDK...</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();

        // 1. Precise Initialization
        const adsController = new TelegramAdsController();
        adsController.initialize({
            pubId: "76092",
            appId: "6584",
        }).then(() => {
            document.getElementById('status').innerText = "SDK Ready ✅";
        }).catch((err) => {
            document.getElementById('status').innerText = "SDK Failed: " + JSON.stringify(err);
        });

        function playAd() {
            document.getElementById('status').innerText = "Requesting Ad...";
            
            adsController.showAd({
                type: 'rewarded', // Using rewarded for better fill rates
                onComplete: () => {
                    document.getElementById('status').innerText = "Completed! Sending reward...";
                    rewardUser();
                },
                onSkipped: () => {
                    tg.showAlert("Ad skipped - no reward.");
                },
                onError: (err) => {
                    // This is the most important part - it will show the REAL error
                    console.error("Ad Error:", err);
                    tg.showAlert("Ad Error: " + (err.message || "No Fill / No Ads Available"));
                    document.getElementById('status').innerText = "Error: " + JSON.stringify(err);
                }
            });
        }

        function rewardUser() {
            const userId = tg.initDataUnsafe.user.id;
            const url = `https://telegramadsbot-jzso.onrender.com/reward?user_id=${userId}`;
            fetch(url).then(() => tg.showAlert("0.01 TON added!"));
        }
    </script>
</body>
</html>
