<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MyEarn TON Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { 
            --bg: #0b0f14; 
            --card: #1c222b; 
            --blue: #0088cc; 
            --green: #28a745; 
            --text-dim: #818d99; 
            --gold: #ffaa00;
        }

        /* 1. Center the entire app on the screen */
        html, body { 
            height: 100%; 
            margin: 0; 
            padding: 0; 
            background: var(--bg);
            display: flex;
            justify-content: center; /* Horizontal Center */
            overflow-x: hidden;
        }

        body { 
            color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            width: 100%;
            max-width: 480px; /* Standard Mobile Width */
            padding: 16px;
            box-sizing: border-box;
        }

        .app-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 2. Style the Cards */
        .glass-card { 
            background: var(--card); 
            padding: 24px; 
            border-radius: 24px; 
            border: 1px solid rgba(255,255,255,0.05); 
            margin-bottom: 16px; 
            width: 100%;
            box-sizing: border-box;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            text-align: center;
        }

        /* 3. Navigation Tabs */
        .tabs { 
            display: flex; 
            gap: 8px; 
            margin-bottom: 20px; 
            background: rgba(0,0,0,0.3); 
            padding: 4px; 
            border-radius: 14px;
            width: 100%;
        }
