<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MyEarn TON Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --bg: #0b0f14; --card: #1c222b; --blue: #0088cc; --green: #28a745; --text-dim: #818d99; --gold: #ffaa00; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; display: flex; justify-content: center; padding: 20px 16px; }
        .app-container { width: 100%; max-width: 420px; display: flex; flex-direction: column; align-items: center; }
        .glass-card { background: var(--card); padding: 24px; border-radius: 24px; margin-bottom: 16px; width: 100%; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .btn { display: block; width: 100%; padding: 18px; border-radius: 16px; font-weight: bold; border: none; cursor: pointer; color: #fff; font-size: 16px; }
        .btn-blue { background: var(--blue); }
        #balance { font-size: 2.5rem; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="glass-card">
        <h2 id="balance" style="color: var(--gold)">0.0000 TON</h2>
        <p style="color: var(--text-dim)">Ready to claim</p>
    </div>
    <button class="btn btn-blue" onclick="handleClaim()">Claim Rewards</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand(); [cite: 33]

    // CHANGE THIS to your Render URL after deploying
    const API_URL = "https://your-backend-url.onrender.com"; 
    const userId = tg.initDataUnsafe?.user?.id;

    async function loadData() {
        if (!userId) return;
        try {
            const res = await fetch(`${API_URL}/get_user_info?user_id=${userId}`);
            const data = await res.json();
            document.getElementById('balance').innerText = `${data.bal.toFixed(4)} TON`;
        } catch (e) { console.error("Error loading data", e); }
    }

    async function handleClaim() {
        try {
            const res = await fetch(`${API_URL}/reward?user_id=${userId}`);
            const data = await res.json();
            
            if (data.status === "ok") {
                document.getElementById('balance').innerText = `${data.new_bal} TON`;
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } }); [cite: 37]
            } else {
                tg.showAlert("Daily limit reached or error!");
            }
        } catch (e) { tg.showAlert("Server is offline!"); }
    }

    loadData();
</script>
</body>
</html>
