<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://js.onclckvd.com/in-stream-ad-admanager/tma.js"></script>
    <style>
        body { background: #0b0e11; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 15px; }
        .card { background: #1c1f24; border-radius: 20px; padding: 20px; margin: 15px 0; border: 1px solid #2d333b; }
        .bal-val { font-size: 36px; color: #0088cc; font-weight: bold; margin: 10px 0; }
        .req-item { font-size: 14px; margin: 8px 0; text-align: left; padding-left: 10%; }
        button { background: #0088cc; color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button:disabled { background: #2d333b; color: #57606a; }
        input { width: 90%; background: #000; color: #0088cc; border: 1px solid #333; padding: 10px; border-radius: 8px; margin-top: 10px; text-align: center; font-size: 12px; }
    </style>
</head>
<body>
    <h2>💎 MyEarn TON</h2>
    
    <div class="card">
        <div style="color: #8a919e; font-size: 12px;">BALANCE</div>
        <div id="bal" class="bal-val">0.0000 TON</div>
        <button id="adBtn" onclick="playAd()" disabled>Loading Ads...</button>
    </div>

    <div class="card">
        <div style="color: #8a919e; font-size: 12px;">WITHDRAWAL LOCK</div>
        <div class="req-item" id="sub-status">❌ Join Channel</div>
        <div class="req-item" id="ref-status">❌ Invite 3 Friends (0/3)</div>
        <button onclick="window.open('https://t.me/+f0K9uT_R-m8zNTlk', '_blank')" style="background: #222; font-size: 13px;">📢 Open Channel</button>
        <button id="withdrawBtn" onclick="requestWithdraw()" disabled>Withdraw TON</button>
    </div>

    <div class="card">
        <div style="color: #8a919e; font-size: 12px;">REFERRED BY YOU</div>
        <input type="text" id="refLink" readonly>
        <button onclick="copyRef()" style="background: #333; font-size: 13px;">Copy Invite Link</button>
    </div>

    <script>
        const tele = window.Telegram.WebApp;
        const RENDER_URL = "https://telegramadsbot-jzso.onrender.com";
        const user = tele.initDataUnsafe?.user;

        // 1. Init OnClickA (ID 432115)
        window.initCdTma?.({ id: '432115' }).then(show => {
            window.show = show;
            document.getElementById('adBtn').disabled = false;
            document.getElementById('adBtn').innerText = "🎥 Watch Ad & Earn";
        }).catch(e => document.getElementById('adBtn').innerText = "Ads Offline");

        // 2. Load Data & Checks
        async function loadAll() {
            if (!user) return;
            document.getElementById('refLink').value = `https://t.me/telegramadsbot-jzso?start=${user.id}`;
            
            try {
                // Fetch Bal & Eligibility
                const res = await fetch(`${RENDER_URL}/check_eligibility?user_id=${user.id}`);
                const data = await res.json();
                
                document.getElementById('bal').innerText = data.bal.toFixed(4) + " TON";
                
                // Update Requirements UI
                document.getElementById('sub-status').innerText = data.is_subbed ? "✅ Subscribed" : "❌ Join Channel";
                document.getElementById('sub-status').style.color = data.is_subbed ? "#7cfc00" : "#ff4d4d";
                
                document.getElementById('ref-status').innerText = `${data.ref_count >= 3 ? '✅' : '❌'} Invite 3 Friends (${data.ref_count}/3)`;
                document.getElementById('ref-status').style.color = data.ref_count >= 3 ? "#7cfc00" : "#ff4d4d";

                if (data.eligible) {
                    const wBtn = document.getElementById('withdrawBtn');
                    wBtn.disabled = false; wBtn.style.background = "#0088cc";
                }
            } catch (e) { console.error(e); }
        }

        async function playAd() {
            if (!window.show) return;
            window.show().then(async () => {
                const res = await fetch(`${RENDER_URL}/reward?user_id=${user.id}`);
                const data = await res.json();
                document.getElementById('bal').innerText = data.new_bal.toFixed(4) + " TON";
                tele.HapticFeedback.notificationOccurred('success');
            }).catch(e => tele.showAlert("Watch the full ad to earn!"));
        }

        function copyRef() {
            document.getElementById("refLink").select();
            document.execCommand("copy");
            tele.showAlert("Link Copied! Share it to get 3 referrals.");
        }

        function requestWithdraw() {
            tele.showPopup({ title: 'Withdraw', message: 'Enter your TON address:', buttons: [{type: 'ok', text: 'Submit'}] });
        }

        tele.ready(); tele.expand(); loadAll();
    </script>
</body>
</html>
