<body>
    <div style="display:flex; justify-content:space-between; padding: 10px;">
        <span id="userTier" style="background:#f1c40f; color:black; padding:2px 10px; border-radius:10px; font-size:12px; font-weight:bold;">BRONZE</span>
        <span id="streakDisplay" style="color:#0088cc; font-size:12px;">🔥 0 Day Streak</span>
    </div>

    <div class="card">
        <div style="color: #8a919e; font-size: 11px;">WALLET BALANCE</div>
        <div id="bal" class="bal-val">0.0000 TON</div>
        <button id="spinBtn" onclick="triggerSpin()" style="background: linear-gradient(to right, #6a11cb, #2575fc);">🎰 LUCKY SPIN (Watch Ad)</button>
        <button id="dailyBtn" onclick="claimDaily()" style="background: #27ae60; margin-top:5px;">📅 CLAIM DAILY BONUS</button>
    </div>

    <div class="card" style="padding: 10px;">
        <div style="font-size:10px; color:#8a919e;">MILESTONES</div>
        <div style="display:flex; justify-content:space-around; margin-top:10px;">
            <div id="m1" style="opacity:0.3">🥉 3 Ref</div>
            <div id="m2" style="opacity:0.3">🥈 10 Ref</div>
            <div id="m3" style="opacity:0.3">🥇 50 Ref</div>
        </div>
    </div>

    <script>
        // ... (Keep your existing tele and RENDER_URL constants)

        async function loadApp() {
            // Existing logic + these updates:
            const res = await fetch(`${RENDER_URL}/check_eligibility?user_id=${user.id}`);
            const data = await res.json();
            
            document.getElementById('streakDisplay').innerText = `🔥 ${data.streak_days || 0} Day Streak`;
            
            // Update Tiers
            const refs = data.ref_count;
            if (refs >= 50) { 
                document.getElementById('userTier').innerText = "GOLD"; 
                document.getElementById('m3').style.opacity = "1";
            } else if (refs >= 10) {
                document.getElementById('userTier').innerText = "SILVER";
                document.getElementById('m2').style.opacity = "1";
            } else if (refs >= 3) {
                document.getElementById('m1').style.opacity = "1";
            }
        }

        async function triggerSpin() {
            const btn = document.getElementById('spinBtn');
            btn.innerText = "🎡 Spinning...";
            
            // 1. Force Ad View
            tele.openLink("https://www.profitablecpmratenetwork.com/hik7av4u?key=a5a57d96e63b358a8e7549b51cab45af");

            // 2. Delay reward to simulate "Spinning"
            setTimeout(async () => {
                const res = await fetch(`${RENDER_URL}/lucky_spin?user_id=${user.id}`);
                const data = await res.json();
                document.getElementById('bal').innerText = data.new_bal.toFixed(4) + " TON";
                tele.showAlert(`${data.msg}\nYou won ${data.win} TON!`);
                btn.innerText = "🎰 LUCKY SPIN (Watch Ad)";
            }, 4000);
        }

        async function claimDaily() {
            const res = await fetch(`${RENDER_URL}/daily_claim?user_id=${user.id}`);
            if (res.status === 400) return tele.showAlert("Already claimed today!");
            
            const data = await res.json();
            document.getElementById('bal').innerText = data.new_bal.toFixed(4) + " TON";
            tele.showAlert(`Daily Bonus Claimed! Streak: ${data.streak} Days`);
            loadApp();
        }
    </script>
</body>
